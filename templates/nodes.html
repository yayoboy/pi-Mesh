{% extends "base.html" %}
{% block content %}
<style>
/* --- Expand row (portrait) --- */
.node-detail { display: none; }
.node-row.expanded .node-detail { display: block; }

/* --- Orientation layout --- */
@media (orientation: portrait) {
  .nodes-portrait { display: flex !important; flex-direction: column; }
  .nodes-landscape { display: none !important; }
}
@media (orientation: landscape) {
  .nodes-portrait { display: none !important; }
  .nodes-landscape { display: flex !important; }
}
.nodes-portrait { display: flex; flex-direction: column; }
.nodes-landscape { display: none; height: 100%; }

/* --- Landscape columns --- */
.node-list-col {
  width: 200px;
  min-width: 160px;
  flex-shrink: 0;
  overflow-y: auto;
  border-right: 1px solid var(--border);
}
.node-detail-col {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.node-list-item {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  font-size: 11px;
  border-left: 3px solid transparent;
  transition: border-left-color 0.15s;
}
.node-list-item.selected {
  border-left-color: var(--accent, #4a9eff);
  background: rgba(74,158,255,0.08);
}

/* --- Shared stat boxes and action buttons --- */
.stat-grid { display: flex; gap: 6px; }
.stat-box {
  background: var(--panel, #12151f);
  border-radius: 4px;
  padding: 6px 8px;
  text-align: center;
  flex: 1;
  min-width: 0;
}
.stat-val { color: var(--text, #ccc); font-weight: 700; font-size: 12px; }
.stat-lbl { color: var(--muted, #666); font-size: 9px; margin-top: 1px; }
.action-grid { display: flex; gap: 6px; flex-wrap: wrap; }
.action-btn {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 6px 4px;
  background: var(--panel, #12151f);
  border: 1px solid var(--border, #2a3a4a);
  border-radius: 4px;
  color: var(--text, #ccc);
  font-size: 10px;
  cursor: pointer;
  white-space: nowrap;
}
.action-btn:active { opacity: 0.7; }
</style>

<div x-data="nodesPage()" x-init="init()" class="h-full flex flex-col overflow-hidden">

  <!-- Header -->
  <div class="flex items-center justify-between px-3 py-2 shrink-0"
       style="border-bottom:1px solid var(--border);font-size:11px;">
    <span style="color:var(--accent);font-weight:600;">Nodi</span>
    <span x-text="nodes.length + ' trovati'" style="color:var(--muted);"></span>
  </div>

  <!-- PORTRAIT VIEW -->
  <div class="nodes-portrait flex-1 overflow-hidden">
    <div class="flex-1 overflow-y-auto" id="node-list" style="height:100%;">
      <template x-if="nodes.length === 0">
        <div class="flex items-center justify-center h-32" style="color:var(--muted);font-size:12px;">
          Nessun nodo rilevato
        </div>
      </template>

      <template x-for="node in nodes" :key="node.id">
        <div class="node-row"
             :class="{ expanded: selectedNodeId === node.id }"
             style="border-bottom:1px solid var(--border);">

          <!-- Summary row — click to expand/collapse -->
          <div class="flex items-center gap-3 px-3 py-2 cursor-pointer"
               style="min-height:52px;"
               @click="selectedNodeId = (selectedNodeId === node.id ? null : node.id)">

            <!-- Avatar -->
            <div class="shrink-0 flex items-center justify-center rounded-full text-white font-bold"
                 :style="`width:34px;height:34px;font-size:9px;font-family:monospace;
                          background:${node.is_local ? '#4a9eff' : (isOnline(node) ? '#4caf50' : '#374151')};
                          ${node.is_local ? 'box-shadow:0 0 8px #4a9eff' : ''}`"
                 x-text="(node.short_name || node.id).slice(0,6)">
            </div>

            <!-- Name + model + last heard -->
            <div class="flex-1 min-w-0">
              <div class="font-semibold truncate" style="font-size:12px;"
                   x-text="node.long_name || node.short_name || node.id"></div>
              <div style="font-size:10px;color:var(--muted);" x-text="node.hw_model || ''"></div>
              <div style="font-size:10px;color:var(--muted);"
                   x-text="node.last_heard ? formatAgo(node.last_heard) : ''"></div>
            </div>

            <!-- Online dot + chevron -->
            <div class="shrink-0 flex flex-col items-center gap-1">
              <div class="w-2 h-2 rounded-full"
                   :style="`background:${node.is_local ? '#4a9eff' : (isOnline(node) ? '#4caf50' : '#374151')}`"></div>
              <svg :style="`transform:${selectedNodeId === node.id ? 'rotate(180deg)' : 'none'};transition:transform 0.2s;`"
                   width="12" height="12" fill="none" stroke="var(--muted)" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
              </svg>
            </div>
          </div>

          <!-- Expanded detail -->
          <div class="node-detail px-3 pb-3" style="border-top:1px solid var(--border);">
            <div class="stat-grid mt-2">
              <div class="stat-box">
                <div class="stat-val" x-text="node.hop_count != null ? node.hop_count : '—'"></div>
                <div class="stat-lbl">Hops</div>
              </div>
              <div class="stat-box">
                <div class="stat-val" x-text="node.snr != null ? node.snr + ' dB' : '—'"></div>
                <div class="stat-lbl">SNR</div>
              </div>
              <div class="stat-box">
                <div class="stat-val" x-text="node.battery_level != null ? node.battery_level + '%' : '—'"></div>
                <div class="stat-lbl">Batt</div>
              </div>
              <div class="stat-box">
                <div class="stat-val" x-text="node.distance_km != null ? node.distance_km.toFixed(1) + 'km' : '—'"></div>
                <div class="stat-lbl">Dist</div>
              </div>
            </div>

            <div class="stat-grid mt-2">
              <div class="stat-box">
                <div class="stat-val" x-text="node.rssi != null ? node.rssi + ' dBm' : '—'"></div>
                <div class="stat-lbl">RSSI</div>
              </div>
              <div class="stat-box">
                <div class="stat-val" x-text="node.altitude != null ? Math.round(node.altitude) + 'm' : '—'"></div>
                <div class="stat-lbl">Alt</div>
              </div>
              <div class="stat-box">
                <div class="stat-val" style="font-size:10px;" x-text="node.role || '—'"></div>
                <div class="stat-lbl">Ruolo</div>
              </div>
              <div class="stat-box">
                <div class="stat-val" style="font-size:10px;" x-text="node.firmware_version || '—'"></div>
                <div class="stat-lbl">FW</div>
              </div>
            </div>

            <div class="mt-2" style="font-size:9px;color:var(--muted);" x-text="node.id"></div>

            <template x-if="!node.is_local">
              <div class="action-grid mt-2">
                <button class="action-btn" @click.stop="doTraceroute(node)">
                  <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
                  </svg>
                  Traceroute
                </button>
                <button class="action-btn" @click.stop="doRequestPosition(node)">
                  <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/>
                  </svg>
                  Posiz.
                </button>
                <button class="action-btn" @click.stop="doDM(node)">
                  <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                  DM
                </button>
                <button class="action-btn" @click.stop="typeof nodeActions !== 'undefined' && nodeActions.focusOnMap(node.id)">
                  <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                  </svg>
                  Mappa
                </button>
                <button class="action-btn" @click.stop="openAdmin(node)"
                        style="color:#e53935;border-color:#7f1d1d;">
                  <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                  Admin
                </button>
                <button class="action-btn" @click.stop="openForget(node)" style="color:#ef4444;border-color:#7f1d1d;">
                  <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                  Dimentica
                </button>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- LANDSCAPE VIEW -->
  <div class="nodes-landscape flex-1" style="min-height:0;">

    <!-- Left: node list -->
    <div class="node-list-col">
      <template x-for="node in nodes" :key="'ls-' + node.id">
        <div class="node-list-item"
             :class="{ selected: selectedNodeId === node.id }"
             @click="selectedNodeId = node.id">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full shrink-0"
                 :style="`background:${node.is_local ? '#4a9eff' : (isOnline(node) ? '#4caf50' : '#374151')}`"></div>
            <span class="truncate" style="font-size:11px;" x-text="node.short_name || node.id"></span>
          </div>
          <div style="font-size:9px;color:var(--muted);margin-top:1px;padding-left:16px;"
               x-text="node.last_heard ? formatAgo(node.last_heard) : ''"></div>
        </div>
      </template>
    </div>

    <!-- Right: detail panel -->
    <div class="node-detail-col">
      <template x-if="selectedNode">
        <div>
          <!-- Node header -->
          <div class="flex items-center gap-3 mb-3">
            <div class="shrink-0 flex items-center justify-center rounded-full text-white font-bold"
                 :style="`width:38px;height:38px;font-size:10px;font-family:monospace;
                          background:${selectedNode.is_local ? '#4a9eff' : (isOnline(selectedNode) ? '#4caf50' : '#374151')};
                          ${selectedNode.is_local ? 'box-shadow:0 0 8px #4a9eff' : ''}`"
                 x-text="(selectedNode.short_name || selectedNode.id).slice(0,6)">
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;"
                   x-text="selectedNode.long_name || selectedNode.short_name || selectedNode.id"></div>
              <div style="font-size:10px;color:var(--accent);" x-text="selectedNode.hw_model || ''"></div>
            </div>
          </div>

          <!-- Last heard -->
          <div style="font-size:10px;color:var(--muted);margin-bottom:10px;"
               x-text="selectedNode.last_heard ? 'Sentito ' + formatAgo(selectedNode.last_heard) : 'Mai sentito'"></div>

          <!-- Stats -->
          <div class="stat-grid mb-3">
            <div class="stat-box">
              <div class="stat-val" x-text="selectedNode.hop_count != null ? selectedNode.hop_count : '—'"></div>
              <div class="stat-lbl">Hops</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" x-text="selectedNode.snr != null ? selectedNode.snr + ' dB' : '—'"></div>
              <div class="stat-lbl">SNR</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" x-text="selectedNode.battery_level != null ? selectedNode.battery_level + '%' : '—'"></div>
              <div class="stat-lbl">Batt</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" x-text="selectedNode.distance_km != null ? selectedNode.distance_km.toFixed(1) + 'km' : '—'"></div>
              <div class="stat-lbl">Dist</div>
            </div>
          </div>

          <!-- Advanced stats -->
          <div class="stat-grid mb-3">
            <div class="stat-box">
              <div class="stat-val" x-text="selectedNode.rssi != null ? selectedNode.rssi + ' dBm' : '—'"></div>
              <div class="stat-lbl">RSSI</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" x-text="selectedNode.altitude != null ? Math.round(selectedNode.altitude) + 'm' : '—'"></div>
              <div class="stat-lbl">Alt</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" style="font-size:10px;" x-text="selectedNode.role || '—'"></div>
              <div class="stat-lbl">Ruolo</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" style="font-size:10px;" x-text="selectedNode.firmware_version || '—'"></div>
              <div class="stat-lbl">FW</div>
            </div>
          </div>

          <!-- Node ID -->
          <div style="font-size:9px;color:var(--muted);margin-bottom:10px;" x-text="selectedNode.id"></div>

          <!-- Actions -->
          <template x-if="!selectedNode.is_local">
            <div class="action-grid">
              <button class="action-btn" @click="doTraceroute(selectedNode)" style="flex-basis:calc(50% - 3px);">
                <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
                </svg>
                Traceroute
              </button>
              <button class="action-btn" @click="doRequestPosition(selectedNode)" style="flex-basis:calc(50% - 3px);">
                <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/>
                </svg>
                Richiedi Pos.
              </button>
              <button class="action-btn" @click="doDM(selectedNode)" style="flex-basis:calc(50% - 3px);">
                <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Invia DM
              </button>
              <button class="action-btn" @click="typeof nodeActions !== 'undefined' && nodeActions.focusOnMap(selectedNode.id)" style="flex-basis:calc(50% - 3px);">
                <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Vedi su Mappa
              </button>
              <button class="action-btn" @click="openAdmin(selectedNode)"
                      style="flex-basis:calc(50% - 3px);color:#e53935;border-color:#7f1d1d;">
                <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Admin
              </button>
              <button class="action-btn" @click="openForget(selectedNode)" style="flex-basis:calc(50% - 3px);color:#ef4444;border-color:#7f1d1d;">
                <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
                Dimentica
              </button>
            </div>
          </template>
        </div>
      </template>
      <template x-if="!selectedNode">
        <div class="flex items-center justify-center h-full" style="color:var(--muted);font-size:12px;">
          Seleziona un nodo
        </div>
      </template>
    </div>
  </div>

  <!-- ADMIN MODAL -->
  <template x-teleport="body">
  <div x-show="adminModal" @click.self="closeAdmin()"
       style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;
              display:flex;align-items:center;justify-content:center;padding:16px;">
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;
                width:100%;max-width:320px;padding:14px;">

      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--text);">Admin remoto</div>
          <div style="font-size:10px;color:var(--muted);" x-text="adminNodeName"></div>
        </div>
        <button @click="closeAdmin()"
                style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;">✕</button>
      </div>

      <!-- Diagnostica -->
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">
        Diagnostica
      </div>
      <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
        <button @click="doAdmin('request-position')" :disabled="adminLoading"
                style="font-size:10px;padding:6px 10px;background:none;border:1px solid var(--border);
                       border-radius:4px;color:var(--text);cursor:pointer;">
          📍 Posizione
        </button>
        <button @click="doAdmin('request-telemetry')" :disabled="adminLoading"
                style="font-size:10px;padding:6px 10px;background:none;border:1px solid var(--border);
                       border-radius:4px;color:var(--text);cursor:pointer;">
          📊 Telemetria
        </button>
      </div>

      <!-- Controllo -->
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">
        Controllo
      </div>
      <div style="display:flex;gap:6px;margin-bottom:12px;">
        <button @click="doAdmin('reboot')" :disabled="adminLoading"
                style="font-size:10px;padding:6px 10px;background:none;border:1px solid #ff9800;
                       border-radius:4px;color:#ff9800;cursor:pointer;">
          🔄 Reboot
        </button>
      </div>

      <!-- Distruttivo -->
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">
        Distruttivo
      </div>
      <template x-if="!confirmReset">
        <button @click="confirmReset=true"
                style="font-size:10px;padding:6px 10px;background:none;border:1px solid #e53935;
                       border-radius:4px;color:#e53935;cursor:pointer;">
          💥 Factory Reset
        </button>
      </template>
      <template x-if="confirmReset">
        <div style="background:#1a0000;border:1px solid #e53935;border-radius:4px;padding:10px;">
          <div style="font-size:10px;color:#e53935;margin-bottom:6px;">
            Operazione irreversibile. Scrivi <b>RESET</b> per confermare:
          </div>
          <input x-model="confirmResetText" placeholder="RESET"
                 style="width:100%;background:var(--panel);color:var(--text);border:1px solid #e53935;
                        border-radius:4px;padding:6px 8px;font-size:12px;margin-bottom:6px;">
          <div style="display:flex;gap:6px;">
            <button @click="doFactoryReset()" :disabled="adminLoading"
                    style="font-size:10px;padding:5px 10px;background:#e53935;color:#fff;
                           border:none;border-radius:4px;cursor:pointer;">
              Conferma
            </button>
            <button @click="confirmReset=false;confirmResetText=''"
                    style="font-size:10px;padding:5px 10px;background:none;border:1px solid var(--border);
                           border-radius:4px;color:var(--muted);cursor:pointer;">
              Annulla
            </button>
          </div>
        </div>
      </template>

      <!-- Status feedback -->
      <div x-show="adminStatus" x-text="adminStatus"
           style="margin-top:10px;font-size:10px;padding:6px 8px;background:var(--panel);
                  border-radius:4px;font-family:monospace;"
           :style="adminStatus.startsWith('✓') ? 'color:#4caf50' : 'color:#ef4444'">
      </div>

    </div>
  </div>
  </template>

  <!-- Modal conferma dimentica nodo -->
  <template x-teleport="body">
    <div x-show="forgetModal"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-50 flex items-center justify-center p-4"
         @keydown.escape.window="forgetModal = false" style="display:none;">
      <div @click="forgetModal = false" class="fixed inset-0" style="background:rgba(0,0,0,.65);"></div>
      <div x-show="forgetModal"
           x-transition:enter="transition ease-out duration-150"
           x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-100"
           x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
           class="relative z-10 w-64 rounded-lg p-5"
           style="background:var(--panel);border:1px solid var(--border);">
        <h3 class="text-sm font-semibold" style="color:var(--text);margin:0 0 6px;">Dimenticare questo nodo?</h3>
        <p style="font-size:11px;color:var(--muted);margin:0 0 12px;">Il nodo verrà rimosso dal database. Tornerà visibile se si fa risentire sulla rete.</p>
        <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);margin-bottom:16px;cursor:pointer;">
          <input type="checkbox" x-model="forgetPurge" style="accent-color:var(--accent);">
          Rimuovi anche messaggi e telemetria
        </label>
        <div class="flex gap-2 justify-end">
          <button @click="forgetModal = false"
                  class="rounded px-3 py-1.5 text-xs"
                  style="background:var(--border);color:var(--text);border:none;cursor:pointer;">Annulla</button>
          <button @click="confirmForget()"
                  class="rounded px-3 py-1.5 text-xs"
                  style="background:#dc2626;color:#fff;border:none;cursor:pointer;">Dimentica</button>
        </div>
      </div>
    </div>
  </template>

  <template x-teleport="body">
    <div x-show="dmModal"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-50 flex items-center justify-center p-4"
         @keydown.escape.window="dmModal = false" style="display:none;">
      <div @click="dmModal = false" class="fixed inset-0" style="background:rgba(0,0,0,.65);"></div>
      <div x-show="dmModal"
           x-transition:enter="transition ease-out duration-150"
           x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-100"
           x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
           class="relative z-10 w-72 rounded-lg p-5"
           style="background:var(--panel);border:1px solid var(--border);">
        <h3 class="text-sm font-semibold" style="color:var(--text);margin:0 0 6px;"
            x-text="'Messaggio a ' + (dmNode?.short_name || dmNode?.id || '')"></h3>
        <textarea x-model="dmText" rows="3" @keydown.enter.ctrl="confirmDM()"
                  class="w-full rounded text-xs p-2" style="background:var(--bg);border:1px solid var(--border);color:var(--text);resize:none;outline:none;margin-bottom:12px;"
                  placeholder="Scrivi un messaggio..."></textarea>
        <div class="flex gap-2 justify-end">
          <button @click="dmModal = false"
                  class="rounded px-3 py-1.5 text-xs"
                  style="background:var(--border);color:var(--text);border:none;cursor:pointer;">Annulla</button>
          <button @click="confirmDM()"
                  class="rounded px-3 py-1.5 text-xs"
                  style="background:var(--accent);color:#fff;border:none;cursor:pointer;">Invia</button>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
function nodesPage() {
  return {
    nodes: [],
    selectedNodeId: null,
    forgetModal: false,
    forgetPurge: false,
    forgetNodeId: null,
    dmModal: false,
    dmNode: null,
    dmText: '',
    adminModal: false,
    adminNodeId: null,
    adminNodeName: '',
    adminStatus: '',
    adminLoading: false,
    confirmReset: false,
    confirmResetText: '',

    get selectedNode() {
      if (!this.selectedNodeId) return null
      return this.nodes.find(n => n.id === this.selectedNodeId) || null
    },

    async init() {
      await this.fetchNodes()
      this._interval = setInterval(() => this.fetchNodes(), 10000)
      this._nodeUpdateHandler = (e) => {
        const updated = e.detail
        const idx = this.nodes.findIndex(n => n.id === updated.id)
        if (idx >= 0) {
          this.nodes[idx] = Object.assign({}, this.nodes[idx], updated)
        } else {
          this.nodes.push(updated)
        }
      }
      window.addEventListener('node-update', this._nodeUpdateHandler)
      this._positionUpdateHandler = (e) => {
        const d = e.detail
        const idx = this.nodes.findIndex(n => n.id === d.id)
        if (idx >= 0) {
          if (d.latitude != null) this.nodes[idx].latitude = d.latitude
          if (d.longitude != null) this.nodes[idx].longitude = d.longitude
          if (d.altitude != null) this.nodes[idx].altitude = d.altitude
          if (d.last_heard != null) this.nodes[idx].last_heard = d.last_heard
        }
      }
      window.addEventListener('position-update', this._positionUpdateHandler)
    },

    destroy() {
      clearInterval(this._interval)
      window.removeEventListener('node-update', this._nodeUpdateHandler)
      window.removeEventListener('position-update', this._positionUpdateHandler)
    },

    async fetchNodes() {
      try {
        const r = await window.fetch('/api/nodes')
        this.nodes = await r.json()
      } catch(e) {}
    },

    isOnline(node) {
      if (!node.last_heard) return false
      return (Date.now() / 1000 - node.last_heard) < 1800
    },

    formatAgo(ts) {
      if (!ts) return 'mai'
      const sec = Math.floor(Date.now() / 1000 - ts)
      if (sec < 60)   return sec + 's fa'
      if (sec < 3600) return Math.floor(sec / 60) + 'm fa'
      return Math.floor(sec / 3600) + 'h fa'
    },

    doTraceroute(node) {
      if (typeof nodeActions === 'undefined') return
      nodeActions.traceroute(node.id)
        .then(() => { if (typeof showToast === 'function') showToast('Traceroute inviato') })
        .catch(() => { if (typeof showToast === 'function') showToast('Traceroute fallito', 'warn') })
    },

    doRequestPosition(node) {
      if (typeof nodeActions === 'undefined') return
      nodeActions.requestPosition(node.id)
        .then(() => { if (typeof showToast === 'function') showToast('Posizione richiesta') })
        .catch(() => { if (typeof showToast === 'function') showToast('Richiesta posizione fallita', 'warn') })
    },

    doDM(node) {
      this.dmNode = node
      this.dmText = ''
      this.dmModal = true
    },

    confirmDM() {
      if (!this.dmText.trim() || typeof nodeActions === 'undefined') { this.dmModal = false; return }
      nodeActions.sendDM(this.dmNode.id, this.dmText.trim())
        .then(() => { if (typeof showToast === 'function') showToast('DM inviato') })
        .catch(() => { if (typeof showToast === 'function') showToast('DM fallito', 'warn') })
      this.dmModal = false
    },

    openForget(node) {
      this.forgetNodeId = node.id
      this.forgetPurge = false
      this.forgetModal = true
    },

    async confirmForget() {
      const url = '/api/nodes/' + encodeURIComponent(this.forgetNodeId) + (this.forgetPurge ? '?purge=true' : '')
      try {
        const r = await fetch(url, { method: 'DELETE' })
        if (r.ok) {
          this.nodes = this.nodes.filter(n => n.id !== this.forgetNodeId)
          if (this.selectedNodeId === this.forgetNodeId) this.selectedNodeId = null
          if (typeof showToast === 'function') showToast('Nodo rimosso')
        }
      } catch(e) {
        if (typeof showToast === 'function') showToast('Errore rimozione', 'warn')
      }
      this.forgetModal = false
    },

    openAdmin(node) {
      this.adminNodeId = node.id
      this.adminNodeName = node.long_name || node.short_name || node.id
      this.adminModal = true
      this.adminStatus = ''
      this.confirmReset = false
      this.confirmResetText = ''
    },

    closeAdmin() {
      this.adminModal = false
      this.adminNodeId = null
      this.adminStatus = ''
      this.confirmReset = false
    },

    async doAdmin(operation) {
      if (!this.adminNodeId) return
      this.adminLoading = true
      this.adminStatus = '...'
      try {
        const r = await fetch(`/api/admin/${encodeURIComponent(this.adminNodeId)}/${operation}`, {method: 'POST'})
        const data = await r.json()
        this.adminStatus = r.ok ? '✓ Comando inviato' : ('✗ ' + (data.error || data.detail || 'Errore'))
      } catch (e) {
        this.adminStatus = '✗ Errore di rete'
      }
      this.adminLoading = false
    },

    async doFactoryReset() {
      if (this.confirmResetText !== 'RESET') {
        this.adminStatus = 'Scrivi RESET per confermare'
        return
      }
      await this.doAdmin('factory-reset')
      this.confirmReset = false
      this.confirmResetText = ''
    },
  }
}
</script>
{% endblock %}
