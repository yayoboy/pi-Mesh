{% extends "base.html" %}
{# Pagina Nodi — master-detail stile prototipo "tattico" (screen 01):
   lista con badge sigla + segnale/batteria, dettaglio con stat-card,
   storico batteria 24h e azioni. Dati da /api/nodes + eventi WS. #}
{% block content %}
<style>
/* --- Layout master-detail --- */
.nodes-wrap { display: flex; height: 100%; }
.node-list-col {
  width: 240px;
  flex-shrink: 0;
  overflow-y: auto;
  border-right: 1px solid var(--border);
  background: var(--panel);
}
@media (min-width: 900px) { .node-list-col { width: 300px; } }
.node-detail-col { flex: 1; min-width: 0; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; }

/* --- Riga nodo --- */
.node-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  min-height: 56px;
}
.node-list-item.selected { background: var(--panel-2); box-shadow: inset 3px 0 0 0 var(--accent); }
.node-list-item.offline { opacity: 0.55; }

/* --- Badge sigla (2 lettere) --- */
.node-badge {
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 6px;
  background: var(--panel-2); border: 1px solid var(--border);
  font-family: var(--font-mono); font-weight: 600; font-size: 13px; color: var(--accent);
}
.node-badge.lg { width: 48px; height: 48px; font-size: 16px; }
.node-list-item.offline .node-badge { color: var(--muted); }

/* --- Pill ruolo --- */
.role-pill {
  font-family: var(--font-mono); font-size: 8px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  background: var(--border); color: var(--accent-bright);
  border-radius: 3px; padding: 1px 5px; vertical-align: 2px; margin-left: 5px;
}

/* --- Micro label mono (titoli sezione, etichette card) --- */
.mlabel {
  font-family: var(--font-mono); font-size: 9px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
}

/* --- Stat card --- */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.stat-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 10px; min-width: 0;
}
.stat-card .val { font-family: var(--font-mono); font-weight: 600; font-size: 19px; color: var(--text); margin-top: 3px; white-space: nowrap; overflow: hidden; }
.stat-card .val .unit { font-size: 11px; color: var(--muted); margin-left: 2px; }
.stat-card.sm .val { font-size: 12px; }

/* --- Pannello batteria 24h --- */
.hist-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 10px; margin-top: 8px; }
.hist-bars { display: flex; align-items: flex-end; gap: 3px; height: 54px; margin-top: 8px; }
.hist-bar { flex: 1; min-width: 2px; border-radius: 1px; background: var(--accent); }
.hist-bar.empty { background: var(--panel-2); height: 15% !important; }

/* --- Azioni --- */
.btn-primary {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--accent); color: var(--accent-contrast); border: none; border-radius: 6px;
  font-size: 13px; font-weight: 600; padding: 11px 14px; cursor: pointer; min-height: 42px;
}
.btn-outline {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: none; color: var(--accent); border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; font-weight: 600; padding: 11px 14px; cursor: pointer; min-height: 42px;
}
.btn-primary:active, .btn-outline:active { opacity: 0.75; }
.action-btn {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 7px 9px; background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); font-size: 10px; cursor: pointer; white-space: nowrap; min-height: 32px;
}
.action-btn:active { opacity: 0.7; }
</style>

<div x-data="nodesPage()" x-init="init()" class="h-full flex flex-col overflow-hidden">

  <!-- Header pagina -->
  <div class="flex items-center justify-between gap-3 px-3 shrink-0"
       style="border-bottom:1px solid var(--border);height:40px;background:var(--panel);">
    <div class="flex items-center gap-2 min-w-0">
      <span class="conn-dot" style="width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;"></span>
      <span style="font-size:13px;font-weight:700;">Nodi</span>
      <span class="mlabel" x-text="'· ' + onlineCount + ' attivi'"></span>
    </div>
    <input x-model="query" placeholder="Cerca nodo..."
           style="width:180px;max-width:40%;background:var(--bg) !important;border:1px solid var(--border);border-radius:14px;padding:5px 12px;font-size:11px;font-family:var(--font-mono);outline:none;">
  </div>

  <div class="nodes-wrap flex-1" style="min-height:0;">

    <!-- Lista nodi -->
    <div class="node-list-col" id="node-list">
      <template x-if="filteredNodes.length === 0">
        <div class="flex items-center justify-center h-32 mlabel">Nessun nodo</div>
      </template>

      <template x-for="node in filteredNodes" :key="node.id">
        <div class="node-list-item"
             :class="{ selected: selectedNodeId === node.id, offline: !isNodeOnline(node) }"
             @click="selectedNodeId = node.id">

          <div class="node-badge" x-text="badge(node)"></div>

          <div class="flex-1 min-w-0">
            <div class="truncate" style="font-size:13px;font-weight:600;">
              <span x-text="node.long_name || node.short_name || node.id"></span><!--
              --><span class="role-pill" x-show="node.is_local" style="color:var(--accent);">locale</span><!--
              --><span class="role-pill" x-show="!node.is_local && node.role && node.role !== 'CLIENT'" x-text="node.role"></span>
            </div>
            <div class="truncate" style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:2px;"
                 x-text="subline(node)"></div>
          </div>

          <div class="shrink-0 flex items-center gap-1.5">
            <svg width="15" height="12" viewBox="0 0 16 14">
              <rect x="0"    y="8"   width="3" height="6"    rx="0.5" :fill="sigBars(node) >= 1 ? 'var(--accent)' : 'var(--panel-2)'"/>
              <rect x="4.5"  y="5.5" width="3" height="8.5"  rx="0.5" :fill="sigBars(node) >= 2 ? 'var(--accent)' : 'var(--panel-2)'"/>
              <rect x="9"    y="3"   width="3" height="11"   rx="0.5" :fill="sigBars(node) >= 3 ? 'var(--accent)' : 'var(--panel-2)'"/>
              <rect x="13"   y="0.5" width="3" height="13.5" rx="0.5" :fill="sigBars(node) >= 4 ? 'var(--accent)' : 'var(--panel-2)'"/>
            </svg>
            <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;min-width:28px;text-align:right;"
                  :style="'color:' + battColor(node)"
                  x-text="node.battery_level != null ? node.battery_level + '%' : '—'"></span>
          </div>
        </div>
      </template>
    </div>

    <!-- Dettaglio -->
    <div class="node-detail-col">
      <template x-if="selectedNode">
        <div class="flex flex-col" style="min-height:100%;">

          <!-- Header nodo -->
          <div class="flex items-center gap-3">
            <div class="node-badge lg" x-text="badge(selectedNode)"></div>
            <div class="flex-1 min-w-0">
              <div class="truncate" style="font-size:18px;font-weight:700;">
                <span x-text="selectedNode.long_name || selectedNode.short_name || selectedNode.id"></span><!--
                --><span class="role-pill" x-show="selectedNode.is_local" style="color:var(--accent);">locale</span><!--
                --><span class="role-pill" x-show="!selectedNode.is_local && selectedNode.role && selectedNode.role !== 'CLIENT'" x-text="selectedNode.role"></span>
              </div>
              <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:2px;"
                   x-text="selectedNode.id + ' · ' + connLabel(selectedNode)"></div>
            </div>
            <div class="shrink-0 flex items-center gap-1.5">
              <span style="width:7px;height:7px;border-radius:50%;"
                    :style="'background:' + (isNodeOnline(selectedNode) ? 'var(--ok)' : 'var(--muted)')"></span>
              <span style="font-family:var(--font-mono);font-size:11px;"
                    :style="'color:' + (isNodeOnline(selectedNode) ? 'var(--accent)' : 'var(--muted)')"
                    x-text="isNodeOnline(selectedNode) ? 'online' : formatAgo(selectedNode.last_heard)"></span>
            </div>
          </div>

          <!-- Stat principali -->
          <div class="stat-grid" style="margin-top:14px;">
            <div class="stat-card">
              <div class="mlabel">Distanza</div>
              <div class="val"><span x-text="selectedNode.distance_km != null ? selectedNode.distance_km.toFixed(1) : '—'"></span><span class="unit" x-show="selectedNode.distance_km != null">km</span></div>
            </div>
            <div class="stat-card">
              <div class="mlabel">SNR</div>
              <div class="val"><span x-text="selectedNode.snr != null ? (selectedNode.snr > 0 ? '+' : '') + selectedNode.snr : '—'"></span><span class="unit" x-show="selectedNode.snr != null">dB</span></div>
            </div>
            <div class="stat-card">
              <div class="mlabel">RSSI</div>
              <div class="val"><span x-text="selectedNode.rssi != null ? selectedNode.rssi : '—'"></span><span class="unit" x-show="selectedNode.rssi != null">dBm</span></div>
            </div>
            <div class="stat-card">
              <div class="mlabel">Hop</div>
              <div class="val" style="font-size:15px;line-height:26px;" x-text="hopLabel(selectedNode)"></div>
            </div>
          </div>

          <!-- Stat secondarie -->
          <div class="stat-grid" style="margin-top:8px;">
            <div class="stat-card sm">
              <div class="mlabel">Batteria</div>
              <div class="val" :style="'color:' + battColor(selectedNode)"
                   x-text="selectedNode.battery_level != null ? selectedNode.battery_level + '%' : '—'"></div>
            </div>
            <div class="stat-card sm">
              <div class="mlabel">Quota</div>
              <div class="val" x-text="selectedNode.altitude != null ? Math.round(selectedNode.altitude) + ' m' : '—'"></div>
            </div>
            <div class="stat-card sm">
              <div class="mlabel">Hardware</div>
              <div class="val" x-text="selectedNode.hw_model || '—'"></div>
            </div>
            <div class="stat-card sm">
              <div class="mlabel">Firmware</div>
              <div class="val" x-text="selectedNode.firmware_version || '—'"></div>
            </div>
          </div>

          <!-- Storico batteria 24h -->
          <div class="hist-panel">
            <div class="flex items-center justify-between">
              <span class="mlabel">Batteria · ultime 24h</span>
              <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;"
                    :style="'color:' + battTrendColor" x-text="battTrend"></span>
            </div>
            <div class="hist-bars" x-show="battHist.some(v => v != null)">
              <template x-for="(v, i) in battHist" :key="i">
                <div class="hist-bar" :class="{ empty: v == null }"
                     :style="v != null ? 'height:' + Math.max(8, v) + '%' : ''"></div>
              </template>
            </div>
            <div x-show="!battHist.some(v => v != null)" class="mlabel" style="margin-top:8px;">nessun dato</div>
          </div>

          <div style="flex:1;"></div>

          <!-- Posizione -->
          <div class="flex items-center justify-between" style="margin-top:12px;padding:4px 2px;">
            <span class="mlabel">Posizione</span>
            <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;" x-text="coordLabel(selectedNode)"></span>
          </div>

          <!-- Azioni -->
          <template x-if="!selectedNode.is_local">
            <div style="margin-top:8px;">
              <div class="flex" style="gap:8px;">
                <button class="btn-primary" style="flex:2;" @click="doDM(selectedNode)">
                  <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                  </svg>
                  Messaggio diretto
                </button>
                <button class="btn-outline" style="flex:1;" @click="doTraceroute(selectedNode)">
                  <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
                  </svg>
                  Traccia
                </button>
              </div>
              <div class="flex flex-wrap" style="gap:6px;margin-top:8px;">
                <button class="action-btn" @click="doRequestPosition(selectedNode)">Posizione</button>
                <button class="action-btn" @click="typeof nodeActions !== 'undefined' && nodeActions.focusOnMap(selectedNode.id)">Mappa</button>
                <button class="action-btn" @click="doFavorite(selectedNode)">Preferito</button>
                <button class="action-btn" @click="doIgnore(selectedNode)">Ignora</button>
                <button class="action-btn" style="color:var(--warn);border-color:var(--warn);" @click="openAdmin(selectedNode)">Admin</button>
                <button class="action-btn" style="color:var(--danger);border-color:var(--danger);" @click="openForget(selectedNode)">Dimentica</button>
              </div>
            </div>
          </template>
        </div>
      </template>

      <template x-if="!selectedNode">
        <div class="flex items-center justify-center h-full mlabel" style="font-size:11px;">Seleziona un nodo</div>
      </template>
    </div>
  </div>

  <!-- ADMIN MODAL -->
  <template x-teleport="body">
  <div x-show="adminModal" @click.self="closeAdmin()"
       style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;
              display:flex;align-items:center;justify-content:center;padding:16px;">
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;
                width:100%;max-width:320px;padding:14px;">

      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--text);">Admin remoto</div>
          <div style="font-size:10px;color:var(--muted);" x-text="adminNodeName"></div>
        </div>
        <button @click="closeAdmin()"
                style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;">✕</button>
      </div>

      <!-- Diagnostica -->
      <div class="mlabel" style="margin-bottom:6px;">Diagnostica</div>
      <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
        <button @click="doAdmin('request-position')" :disabled="adminLoading"
                style="font-size:10px;padding:6px 10px;background:none;border:1px solid var(--border);
                       border-radius:4px;color:var(--text);cursor:pointer;">
          📍 Posizione
        </button>
        <button @click="doAdmin('request-telemetry')" :disabled="adminLoading"
                style="font-size:10px;padding:6px 10px;background:none;border:1px solid var(--border);
                       border-radius:4px;color:var(--text);cursor:pointer;">
          📊 Telemetria
        </button>
      </div>

      <!-- Controllo -->
      <div class="mlabel" style="margin-bottom:6px;">Controllo</div>
      <div style="display:flex;gap:6px;margin-bottom:12px;">
        <button @click="doAdmin('reboot')" :disabled="adminLoading"
                style="font-size:10px;padding:6px 10px;background:none;border:1px solid var(--warn);
                       border-radius:4px;color:var(--warn);cursor:pointer;">
          🔄 Reboot
        </button>
      </div>

      <!-- Distruttivo -->
      <div class="mlabel" style="margin-bottom:6px;">Distruttivo</div>
      <template x-if="!confirmReset">
        <button @click="confirmReset=true"
                style="font-size:10px;padding:6px 10px;background:none;border:1px solid var(--danger);
                       border-radius:4px;color:var(--danger);cursor:pointer;">
          💥 Factory Reset
        </button>
      </template>
      <template x-if="confirmReset">
        <div style="background:var(--panel);border:1px solid var(--danger);border-radius:4px;padding:10px;">
          <div style="font-size:10px;color:var(--danger);margin-bottom:6px;">
            Operazione irreversibile. Scrivi <b>RESET</b> per confermare:
          </div>
          <input x-model="confirmResetText" placeholder="RESET"
                 style="width:100%;background:var(--panel);color:var(--text);border:1px solid var(--danger);
                        border-radius:4px;padding:6px 8px;font-size:12px;margin-bottom:6px;">
          <div style="display:flex;gap:6px;">
            <button @click="doFactoryReset()" :disabled="adminLoading"
                    style="font-size:10px;padding:5px 10px;background:var(--danger);color:var(--accent-contrast);
                           border:none;border-radius:4px;cursor:pointer;">
              Conferma
            </button>
            <button @click="confirmReset=false;confirmResetText=''"
                    style="font-size:10px;padding:5px 10px;background:none;border:1px solid var(--border);
                           border-radius:4px;color:var(--muted);cursor:pointer;">
              Annulla
            </button>
          </div>
        </div>
      </template>

      <!-- Status feedback -->
      <div x-show="adminStatus" x-text="adminStatus"
           style="margin-top:10px;font-size:10px;padding:6px 8px;background:var(--panel);
                  border-radius:4px;font-family:var(--font-mono);"
           :style="adminStatus.startsWith('✓') ? 'color:var(--ok)' : 'color:var(--danger)'">
      </div>

    </div>
  </div>
  </template>

  <!-- Modal conferma dimentica nodo -->
  <template x-teleport="body">
    <div x-show="forgetModal"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-50 flex items-center justify-center p-4"
         @keydown.escape.window="forgetModal = false" style="display:none;">
      <div @click="forgetModal = false" class="fixed inset-0" style="background:rgba(0,0,0,.65);"></div>
      <div x-show="forgetModal"
           x-transition:enter="transition ease-out duration-150"
           x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-100"
           x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
           class="relative z-10 w-64 rounded-lg p-5"
           style="background:var(--panel);border:1px solid var(--border);">
        <h3 class="text-sm font-semibold" style="color:var(--text);margin:0 0 6px;">Dimenticare questo nodo?</h3>
        <p style="font-size:11px;color:var(--muted);margin:0 0 12px;">Il nodo verrà rimosso dal database. Tornerà visibile se si fa risentire sulla rete.</p>
        <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);margin-bottom:16px;cursor:pointer;">
          <input type="checkbox" x-model="forgetPurge" style="accent-color:var(--accent);">
          Rimuovi anche messaggi e telemetria
        </label>
        <div class="flex gap-2 justify-end">
          <button @click="forgetModal = false"
                  class="rounded px-3 py-1.5 text-xs"
                  style="background:var(--border);color:var(--text);border:none;cursor:pointer;">Annulla</button>
          <button @click="confirmForget()"
                  class="rounded px-3 py-1.5 text-xs"
                  style="background:var(--danger);color:var(--accent-contrast);border:none;cursor:pointer;">Dimentica</button>
        </div>
      </div>
    </div>
  </template>

  <template x-teleport="body">
    <div x-show="dmModal"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-50 flex items-center justify-center p-4"
         @keydown.escape.window="dmModal = false" style="display:none;">
      <div @click="dmModal = false" class="fixed inset-0" style="background:rgba(0,0,0,.65);"></div>
      <div x-show="dmModal"
           x-transition:enter="transition ease-out duration-150"
           x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-100"
           x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
           class="relative z-10 w-72 rounded-lg p-5"
           style="background:var(--panel);border:1px solid var(--border);">
        <h3 class="text-sm font-semibold" style="color:var(--text);margin:0 0 6px;"
            x-text="'Messaggio a ' + (dmNode?.short_name || dmNode?.id || '')"></h3>
        <textarea x-model="dmText" rows="3" @keydown.enter.ctrl="confirmDM()"
                  class="w-full rounded text-xs p-2" style="background:var(--bg);border:1px solid var(--border);color:var(--text);resize:none;outline:none;margin-bottom:12px;"
                  placeholder="Scrivi un messaggio..."></textarea>
        <div class="flex gap-2 justify-end">
          <button @click="dmModal = false"
                  class="rounded px-3 py-1.5 text-xs"
                  style="background:var(--border);color:var(--text);border:none;cursor:pointer;">Annulla</button>
          <button @click="confirmDM()"
                  class="rounded px-3 py-1.5 text-xs"
                  style="background:var(--accent);color:var(--accent-contrast);border:none;cursor:pointer;">Invia</button>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
function nodesPage() {
  return {
    nodes: [],
    selectedNodeId: null,
    query: '',
    battHist: [],
    battTrend: '',
    forgetModal: false,
    forgetPurge: false,
    forgetNodeId: null,
    dmModal: false,
    dmNode: null,
    dmText: '',
    adminModal: false,
    adminNodeId: null,
    adminNodeName: '',
    adminStatus: '',
    adminLoading: false,
    confirmReset: false,
    confirmResetText: '',

    get selectedNode() {
      if (!this.selectedNodeId) return null
      return this.nodes.find(n => n.id === this.selectedNodeId) || null
    },

    get filteredNodes() {
      const q = this.query.trim().toLowerCase()
      if (!q) return this.nodes
      return this.nodes.filter(n =>
        (n.long_name || '').toLowerCase().includes(q) ||
        (n.short_name || '').toLowerCase().includes(q) ||
        (n.id || '').toLowerCase().includes(q))
    },

    get onlineCount() {
      return this.nodes.filter(n => this.isNodeOnline(n)).length
    },

    get battTrendColor() {
      if (this.battTrend === 'in calo') return 'var(--warn)'
      if (this.battTrend === 'in carica') return 'var(--ok)'
      return 'var(--accent)'
    },

    async init() {
      await this.fetchNodes()
      this._interval = setInterval(() => this.fetchNodes(), 5000)
      this.$watch('selectedNodeId', id => { if (id) this.fetchBattHist(id) })
      this._nodeUpdateHandler = (e) => {
        const updated = e.detail
        const idx = this.nodes.findIndex(n => n.id === updated.id)
        if (idx >= 0) {
          this.nodes[idx] = Object.assign({}, this.nodes[idx], updated)
        } else {
          this.nodes.push(updated)
        }
      }
      window.addEventListener('node-update', this._nodeUpdateHandler)
      this._positionUpdateHandler = (e) => {
        const d = e.detail
        const idx = this.nodes.findIndex(n => n.id === d.id)
        if (idx >= 0) {
          if (d.latitude != null) this.nodes[idx].latitude = d.latitude
          if (d.longitude != null) this.nodes[idx].longitude = d.longitude
          if (d.altitude != null) this.nodes[idx].altitude = d.altitude
          if (d.last_heard != null) this.nodes[idx].last_heard = d.last_heard
        }
      }
      window.addEventListener('position-update', this._positionUpdateHandler)
    },

    destroy() {
      clearInterval(this._interval)
      window.removeEventListener('node-update', this._nodeUpdateHandler)
      window.removeEventListener('position-update', this._positionUpdateHandler)
    },

    async fetchNodes() {
      try {
        const r = await window.fetch('/api/nodes')
        this.nodes = await r.json()
      } catch(e) {}
    },

    // Storico batteria 24h → 24 bucket orari (media per bucket, null = nessun dato)
    async fetchBattHist(nodeId) {
      this.battHist = []
      this.battTrend = ''
      try {
        const since = Math.floor(Date.now() / 1000) - 86400
        const r = await window.fetch(`/api/telemetry?node_id=${encodeURIComponent(nodeId)}&ttype=device&since=${since}&limit=300`)
        const rows = await r.json()
        if (this.selectedNodeId !== nodeId) return
        const buckets = Array.from({length: 24}, () => [])
        rows.forEach(row => {
          const lvl = row.data && row.data.battery_level
          if (lvl == null) return
          const age = Math.floor(Date.now() / 1000) - row.ts
          const b = 23 - Math.min(23, Math.floor(age / 3600))
          buckets[b].push(lvl)
        })
        this.battHist = buckets.map(b => b.length ? Math.round(b.reduce((a, v) => a + v, 0) / b.length) : null)
        const vals = this.battHist.filter(v => v != null)
        if (vals.length >= 2) {
          const delta = vals[vals.length - 1] - vals[0]
          this.battTrend = delta > 3 ? 'in carica' : (delta < -8 ? 'in calo' : 'stabile')
        }
      } catch(e) {}
    },

    // Sigla badge: short_name (max 3 char) o coda dell'id
    badge(node) {
      const s = (node.short_name || '').trim()
      if (s) return s.slice(0, 3).toUpperCase()
      return (node.id || '??').slice(-2).toUpperCase()
    },

    // Barre segnale 0-4 dal SNR (LoRa: >7 ottimo, < -15 pessimo)
    sigBars(node) {
      if (!this.isNodeOnline(node)) return 0
      const snr = node.snr
      if (snr == null) return node.is_local ? 4 : 0
      if (snr > 7)   return 4
      if (snr > 0)   return 3
      if (snr > -7)  return 2
      if (snr > -15) return 1
      return 0
    },

    battColor(node) {
      const b = node.battery_level
      if (b == null) return 'var(--muted)'
      if (b >= 60) return 'var(--accent)'
      if (b >= 30) return 'var(--warn)'
      return 'var(--danger)'
    },

    hopLabel(node) {
      if (node.is_local) return '—'
      if (node.hop_count == null) return '—'
      return node.hop_count === 0 ? 'diretto' : node.hop_count + ' hop'
    },

    connLabel(node) {
      if (node.is_local) return 'questo nodo'
      if (node.hop_count == null) return 'connessione sconosciuta'
      return node.hop_count === 0 ? 'connessione diretta' : 'via mesh · ' + node.hop_count + ' hop'
    },

    // "diretto · 2.4 km · SNR +9.5" (riga lista) — offline: ultimo contatto
    subline(node) {
      if (node.is_local) return 'nodo locale'
      if (!this.isOnline(node)) return this.formatAgo(node.last_heard)
      const parts = []
      if (node.hop_count != null) parts.push(node.hop_count === 0 ? 'diretto' : node.hop_count + ' hop')
      if (node.distance_km != null) parts.push(node.distance_km.toFixed(1) + ' km')
      if (node.snr != null) parts.push('SNR ' + (node.snr > 0 ? '+' : '') + node.snr)
      return parts.join(' · ') || this.formatAgo(node.last_heard)
    },

    coordLabel(node) {
      if (node.latitude == null || node.longitude == null) return '—'
      const lat = Math.abs(node.latitude).toFixed(4) + ' ' + (node.latitude >= 0 ? 'N' : 'S')
      const lon = Math.abs(node.longitude).toFixed(4) + ' ' + (node.longitude >= 0 ? 'E' : 'W')
      const alt = node.altitude != null ? ' · ' + Math.round(node.altitude) + ' m' : ''
      return lat + ' · ' + lon + alt
    },

    isOnline(node) {
      if (!node.last_heard) return false
      return (Date.now() / 1000 - node.last_heard) < 1800
    },

    // Il nodo locale è "online" solo se la board è davvero collegata
    // (window.boardConnected arriva dal messaggio WS 'status' in app.js).
    isNodeOnline(node) {
      if (node.is_local) return window.boardConnected === true
      return this.isOnline(node)
    },

    formatAgo(ts) {
      if (!ts) return 'mai'
      const sec = Math.floor(Date.now() / 1000 - ts)
      if (sec < 60)   return sec + 's fa'
      if (sec < 3600) return Math.floor(sec / 60) + 'm fa'
      if (sec < 86400) return Math.floor(sec / 3600) + 'h fa'
      return Math.floor(sec / 86400) + 'g fa'
    },

    doFavorite(node) {
      fetch(`/api/nodes/${encodeURIComponent(node.id)}/favorite?on=true`, { method: 'POST' })
        .then(r => { if (!r.ok) throw new Error()
          if (typeof showToast === 'function') showToast('Nodo tra i preferiti della board') })
        .catch(() => { if (typeof showToast === 'function') showToast('Operazione fallita', 'warn') })
    },

    doIgnore(node) {
      if (!confirm(`Ignorare ${node.short_name || node.id}? La board scarterà i suoi pacchetti.`)) return
      fetch(`/api/nodes/${encodeURIComponent(node.id)}/ignore?on=true`, { method: 'POST' })
        .then(r => { if (!r.ok) throw new Error()
          if (typeof showToast === 'function') showToast('Nodo ignorato dalla board') })
        .catch(() => { if (typeof showToast === 'function') showToast('Operazione fallita', 'warn') })
    },

    doTraceroute(node) {
      if (typeof nodeActions === 'undefined') return
      nodeActions.traceroute(node.id)
        .then(() => { if (typeof showToast === 'function') showToast('Traceroute inviato') })
        .catch(() => { if (typeof showToast === 'function') showToast('Traceroute fallito', 'warn') })
    },

    doRequestPosition(node) {
      if (typeof nodeActions === 'undefined') return
      nodeActions.requestPosition(node.id)
        .then(() => { if (typeof showToast === 'function') showToast('Posizione richiesta') })
        .catch(() => { if (typeof showToast === 'function') showToast('Richiesta posizione fallita', 'warn') })
    },

    doDM(node) {
      this.dmNode = node
      this.dmText = ''
      this.dmModal = true
    },

    confirmDM() {
      if (!this.dmText.trim() || typeof nodeActions === 'undefined') { this.dmModal = false; return }
      nodeActions.sendDM(this.dmNode.id, this.dmText.trim())
        .then(() => { if (typeof showToast === 'function') showToast('DM inviato') })
        .catch(() => { if (typeof showToast === 'function') showToast('DM fallito', 'warn') })
      this.dmModal = false
    },

    openForget(node) {
      this.forgetNodeId = node.id
      this.forgetPurge = false
      this.forgetModal = true
    },

    async confirmForget() {
      const url = '/api/nodes/' + encodeURIComponent(this.forgetNodeId) + (this.forgetPurge ? '?purge=true' : '')
      try {
        const r = await fetch(url, { method: 'DELETE' })
        if (r.ok) {
          this.nodes = this.nodes.filter(n => n.id !== this.forgetNodeId)
          if (this.selectedNodeId === this.forgetNodeId) this.selectedNodeId = null
          if (typeof showToast === 'function') showToast('Nodo rimosso')
        }
      } catch(e) {
        if (typeof showToast === 'function') showToast('Errore rimozione', 'warn')
      }
      this.forgetModal = false
    },

    openAdmin(node) {
      this.adminNodeId = node.id
      this.adminNodeName = node.long_name || node.short_name || node.id
      this.adminModal = true
      this.adminStatus = ''
      this.confirmReset = false
      this.confirmResetText = ''
    },

    closeAdmin() {
      this.adminModal = false
      this.adminNodeId = null
      this.adminStatus = ''
      this.confirmReset = false
    },

    async doAdmin(operation) {
      if (!this.adminNodeId) return
      this.adminLoading = true
      this.adminStatus = '...'
      try {
        const r = await fetch(`/api/admin/${encodeURIComponent(this.adminNodeId)}/${operation}`, {method: 'POST'})
        const data = await r.json()
        this.adminStatus = r.ok ? '✓ Comando inviato' : ('✗ ' + (data.error || data.detail || 'Errore'))
      } catch (e) {
        this.adminStatus = '✗ Errore di rete'
      }
      this.adminLoading = false
    },

    async doFactoryReset() {
      if (this.confirmResetText !== 'RESET') {
        this.adminStatus = 'Scrivi RESET per confermare'
        return
      }
      await this.doAdmin('factory-reset')
      this.confirmReset = false
      this.confirmResetText = ''
    },
  }
}
</script>
