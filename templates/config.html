{% extends "base.html" %}
{% block content %}
<style>
/* Display larghi (HDMI): sidebar più leggibile, form a larghezza contenuta. */
.cfg-sidebar { width: 80px; }
@media (min-width: 640px) {
  .cfg-sidebar { width: 150px; }
  .cfg-sidebar > div > div { font-size: 11px !important; }
  .cfg-content > * { max-width: 640px; }
}
</style>
<div x-data="configPage()" style="display:flex;height:100%;overflow:hidden;">

  <!-- SIDEBAR (80px, più larga su display HDMI) -->
  <div class="cfg-sidebar" style="border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:#0a0d14;">
    <div style="padding:8px 8px 4px;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">Config</div>
    <template x-for="g in groups" :key="g.id">
      <div>
        <div @click="openGroup = openGroup === g.id ? null : g.id"
             style="padding:7px 8px;cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;"
             :style="openGroup === g.id ? 'color:var(--accent);' : 'color:var(--muted);'">
          <span x-text="(openGroup === g.id ? '▾ ' : '▸ ') + g.label"></span>
        </div>
        <template x-if="openGroup === g.id">
          <div>
            <template x-for="s in g.sections" :key="s.id">
              <div @click="selectSection(s.id, g.id)"
                   style="padding:7px 8px 7px 16px;cursor:pointer;font-size:11px;border-left:2px solid transparent;"
                   :style="section === s.id
                     ? 'border-left-color:var(--accent);background:var(--panel);color:var(--accent);font-weight:600;'
                     : 'color:var(--muted);'">
                <span x-text="s.label"></span>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>
  </div>

  <!-- CONTENT AREA -->
  <div class="cfg-content" style="flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;">

    {% include 'config/_board.html' %}
    {% include 'config/_pi.html' %}
    {% include 'config/_ui.html' %}

  </div><!-- /CONTENT -->

    <!-- Factory Reset Modal -->
    <template x-if="factoryModal">
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;" @click.self="factoryModal = false">
        <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px;max-width:280px;width:90%;">
          <div style="font-size:13px;font-weight:700;color:#ef4444;margin-bottom:10px;">Factory Reset</div>
          <div style="font-size:11px;color:var(--text);margin-bottom:16px;line-height:1.5;">
            Questo cancellerà tutte le impostazioni del nodo Meshtastic e ripristinerà i valori di fabbrica. L'operazione non è reversibile.
          </div>
          <div style="display:flex;gap:8px;">
            <button @click="factoryModal = false"
                    style="flex:1;padding:10px;font-size:12px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--panel);color:var(--text);">
              Annulla
            </button>
            <button @click="doFactoryReset()"
                    style="flex:1;padding:10px;font-size:12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;background:#ef4444;color:#fff;">
              Conferma Reset
            </button>
          </div>
        </div>
      </div>
    </template>

  <!-- Color picker modal — teleported to body to escape overflow:hidden container -->
  <template x-teleport="body">
    <div x-show="cpOpen"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-50 flex items-center justify-center p-4"
         @keydown.escape.window="cpOpen = false" style="display:none;">
      <div @click="cpOpen=false" class="fixed inset-0" style="background:rgba(0,0,0,.65);"></div>
      <div x-show="cpOpen"
           x-transition:enter="transition ease-out duration-150"
           x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-100"
           x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
           class="relative z-10 rounded-lg p-3" style="width:280px;background:var(--panel);border:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:11px;font-weight:600;color:var(--text);" x-text="cpLabel"></span>
          <button @click="cpOpen=false" style="background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0;line-height:1;">✕</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <span style="width:36px;height:36px;border-radius:6px;border:1px solid var(--border);flex-shrink:0;" :style="'background:' + cpValue"></span>
          <input type="text" :value="cpValue" maxlength="7" @input="cpSetHex($event.target.value)"
                 style="flex:1;height:32px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:monospace;font-size:12px;padding:0 8px;text-transform:uppercase;">
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <input type="color" :value="cpValue" @input="cpSelect($event.target.value)"
                 style="width:48px;height:48px;border:1px solid var(--border);border-radius:6px;padding:2px;cursor:pointer;background:var(--bg);">
          <span style="font-size:10px;color:var(--muted);">Tocca per scegliere</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px;">
          <template x-for="c in cpPalette" :key="c">
            <button @click="cpSelect(c)" style="width:100%;aspect-ratio:1;border-radius:4px;border:none;cursor:pointer;padding:0;min-height:32px;"
                    :style="'background:' + c + ';' + (cpValue===c ? 'box-shadow:0 0 0 2px #fff;' : '')"></button>
          </template>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
          <template x-for="c in cpGrays" :key="c">
            <button @click="cpSelect(c)" style="width:100%;aspect-ratio:1;border-radius:4px;border:1px solid var(--border);cursor:pointer;padding:0;min-height:32px;"
                    :style="'background:' + c + ';' + (cpValue===c ? 'box-shadow:0 0 0 2px var(--accent);' : '')"></button>
          </template>
        </div>
      </div>
    </div>
  </template>

</div><!-- /x-data -->

<script src="/static/config.js?v=1"></script>
{% endblock %}
