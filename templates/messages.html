{% extends "base.html" %}
{% block content %}
<div x-data="messagesPage()" style="display:flex;height:100%;overflow:hidden;">

  <!-- SIDEBAR LEFT 130px -->
  <div style="width:130px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;">
    <div style="padding:8px 6px 4px;font-size:10px;color:var(--accent);font-weight:bold;text-transform:uppercase;letter-spacing:.06em;">Conv</div>

    <!-- Broadcast entry -->
    <div @click="selectConv('broadcast', null)" style="padding:5px 8px;display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;"
         :style="conv === 'broadcast' ? 'border-left:2px solid var(--accent);background:var(--panel)' : 'border-left:2px solid transparent'">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/>
      </svg>
      <span>Broadcast</span>
    </div>

    <div style="height:1px;background:var(--border);margin:4px 6px;"></div>
    <div style="padding:2px 8px 4px;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;">Diretti</div>

    <!-- DM thread list -->
    <div style="flex:1;overflow-y:auto;">
      <template x-for="thread in dmThreads" :key="thread.peer_id">
        <div @click="selectConv('dm', thread.peer_id)"
             style="padding:5px 8px;display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;"
             :style="conv === thread.peer_id ? 'border-left:2px solid var(--accent);background:var(--panel)' : 'border-left:2px solid transparent'">
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" x-text="thread.short_name || thread.peer_id"></span>
          <span x-show="thread.unread > 0" style="width:7px;height:7px;border-radius:50%;background:#4a9eff;flex-shrink:0;"></span>
        </div>
      </template>
    </div>
  </div>

  <!-- THREAD AREA RIGHT -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">

    <!-- Thread header -->
    <div style="padding:6px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <span x-text="convTitle" style="font-weight:bold;font-size:12px;"></span>
      <!-- Channel selector — broadcast only -->
      <div x-show="conv === 'broadcast'" style="display:flex;align-items:center;gap:3px;">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--muted)">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 5.5A3.5 3.5 0 018.5 2H12v7H8.5A3.5 3.5 0 015 5.5zm7 0V2h3.5A3.5 3.5 0 0119 5.5v0A3.5 3.5 0 0115.5 9H12V5.5zm0 7v-3.5h3.5A3.5 3.5 0 0119 12.5v0a3.5 3.5 0 01-3.5 3.5H12zm0 0v3.5H8.5A3.5 3.5 0 015 18.5v0A3.5 3.5 0 018.5 15H12z"/>
        </svg>
        <select x-model.number="channel" @change="loadMessages()" style="font-size:11px;background:var(--panel);color:var(--text,#ccc);border:1px solid var(--border);border-radius:3px;padding:2px 4px;">
          <template x-for="i in [0,1,2,3,4,5,6,7]">
            <option :value="i" x-text="i"></option>
          </template>
        </select>
      </div>
      <!-- Trash icon — clear history -->
      <button @click="showConfirm = true" title="Pulisci cronologia"
              style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);padding:2px;line-height:0;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>

    <!-- Message list -->
    <div x-ref="msgList" style="flex:1;overflow-y:auto;padding:4px 8px;display:flex;flex-direction:column;">
      <!-- Infinite scroll sentinel (top) -->
      <div x-ref="sentinel" style="height:1px;flex-shrink:0;"></div>

      <template x-for="msg in messages" :key="msg.id">
        <div class="msg-row" :class="{ outgoing: msg.is_outgoing }">
          <div class="msg-bubble" x-text="msg.text"></div>
          <div class="msg-meta">
            <template x-if="!msg.is_outgoing">
              <span x-text="nodeName(msg.node_id) + ' \xb7 '"></span>
            </template>
            <span x-text="new Date(msg.ts * 1000).toLocaleTimeString('it', { hour:'2-digit', minute:'2-digit' })"></span>
            <template x-if="msg.rx_snr != null">
              <span x-text="' \xb7 ' + msg.rx_snr + 'dB'"></span>
            </template>
            <template x-if="msg.hop_count != null && msg.hop_count > 0">
              <span x-text="' \xb7 ' + msg.hop_count + 'hop'"></span>
            </template>
            <template x-if="msg.is_outgoing">
              <span :class="msg.ack ? 'msg-ack delivered' : 'msg-ack'"
                    :title="msg.ack ? 'Consegnato' : 'Inviato'"
                    x-text="msg.ack ? ' \u2713\u2713' : ' \u2713'"></span>
            </template>
          </div>
        </div>
      </template>
    </div>

    <!-- Send form -->
    <div style="padding:6px 8px;border-top:1px solid var(--border);flex-shrink:0;">
      <form @submit.prevent="send()" style="display:flex;gap:4px;">
        <input x-ref="input" type="text" placeholder="Messaggio..." autocomplete="off"
               style="flex:1;min-height:32px;font-size:12px;">
        <button type="submit" style="width:40px;min-height:32px;padding:0;">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </form>
    </div>
  </div>

  <!-- Confirm modal (PinesUI style) -->
  <template x-teleport="body">
    <div x-show="showConfirm"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-50 flex items-center justify-center p-4"
         @keydown.escape.window="showConfirm = false"
         style="display:none;">
      <!-- Overlay -->
      <div @click="showConfirm = false" class="fixed inset-0" style="background:rgba(0,0,0,.65);"></div>
      <!-- Dialog -->
      <div x-show="showConfirm"
           x-transition:enter="transition ease-out duration-150"
           x-transition:enter-start="opacity-0 scale-95"
           x-transition:enter-end="opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-100"
           x-transition:leave-start="opacity-100 scale-100"
           x-transition:leave-end="opacity-0 scale-95"
           class="relative z-10 w-64 rounded-lg p-5"
           style="background:var(--panel);border:1px solid var(--border);">
        <h3 class="text-sm font-semibold" style="color:var(--text);margin:0 0 6px;">Cancellare la cronologia?</h3>
        <p style="font-size:11px;color:var(--muted);margin:0 0 16px;">Tutti i messaggi verranno eliminati definitivamente.</p>
        <div class="flex gap-2 justify-end">
          <button @click="showConfirm = false"
                  class="rounded px-3 py-1.5 text-xs"
                  style="background:var(--border);color:var(--text);border:none;cursor:pointer;">
            Annulla
          </button>
          <button @click="clearHistory()"
                  class="rounded px-3 py-1.5 text-xs"
                  style="background:#dc2626;color:#fff;border:none;cursor:pointer;">
            Elimina
          </button>
        </div>
      </div>
    </div>
  </template>

</div>

<script>
function messagesPage() {
  return {
    conv: 'broadcast',
    channel: 0,
    messages: [],
    dmThreads: [],
    hasMore: false,
    loading: false,
    showConfirm: false,
    _onMessage: null,
    _onAck: null,
    _observer: null,

    get convTitle() {
      if (this.conv === 'broadcast') return 'Broadcast'
      const t = this.dmThreads.find(t => t.peer_id === this.conv)
      if (t && t.short_name) return t.short_name
      return window.nodeCache?.get(this.conv)?.short_name || this.conv
    },

    nodeName(nodeId) {
      return window.nodeCache?.get(nodeId)?.short_name || nodeId
    },

    async init() {
      await this.loadDmThreads()
      await this.loadMessages()
      this._onMessage = (e) => this.onNewMessage(e.detail)
      this._onAck = (e) => this.onAck(e.detail)
      window.addEventListener('message-new', this._onMessage)
      window.addEventListener('msg-ack', this._onAck)
      this._onNodeUpdate = () => { this.messages = [...this.messages] }
      window.addEventListener('ws-init', this._onNodeUpdate)
      this._observer = new IntersectionObserver(([entry]) => {
        if (entry.isIntersecting) this.loadMore()
      })
      this.$nextTick(() => {
        if (this.$refs.sentinel) this._observer.observe(this.$refs.sentinel)
      })
      const openDm = new URLSearchParams(window.location.search).get('open_dm')
      if (openDm) await this.selectConv('dm', openDm)
    },

    destroy() {
      window.removeEventListener('message-new', this._onMessage)
      window.removeEventListener('msg-ack', this._onAck)
      window.removeEventListener('ws-init', this._onNodeUpdate)
      if (this._observer) this._observer.disconnect()
    },

    async selectConv(type, peerId) {
      this.conv = type === 'broadcast' ? 'broadcast' : peerId
      this.messages = []
      await this.loadMessages()
      if (type !== 'broadcast') {
        fetch('/api/dm/read', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ peer_id: peerId })
        })
        const thread = this.dmThreads.find(t => t.peer_id === peerId)
        if (thread) thread.unread = 0
      }
    },

    async loadMessages() {
      if (this.loading) return
      this.loading = true
      try {
        const url = this.conv === 'broadcast'
          ? '/api/messages?channel=' + this.channel + '&limit=50'
          : '/api/dm/messages?peer=' + encodeURIComponent(this.conv) + '&limit=50'
        const r = await fetch(url)
        if (!r.ok) return
        const data = await r.json()
        this.messages = data
        this.hasMore = data.length === 50
        this.$nextTick(() => {
          if (this.$refs.msgList) this.$refs.msgList.scrollTop = this.$refs.msgList.scrollHeight
        })
      } finally {
        this.loading = false
      }
    },

    async loadMore() {
      if (this.loading || !this.hasMore || !this.messages.length) return
      const beforeId = this.messages[0].id
      this.loading = true
      try {
        const url = this.conv === 'broadcast'
          ? '/api/messages?channel=' + this.channel + '&limit=50&before_id=' + beforeId
          : '/api/dm/messages?peer=' + encodeURIComponent(this.conv) + '&limit=50&before_id=' + beforeId
        const r = await fetch(url)
        if (!r.ok) return
        const data = await r.json()
        const prevH = this.$refs.msgList.scrollHeight
        this.messages = [...data, ...this.messages]
        this.$nextTick(() => {
          this.$refs.msgList.scrollTop = this.$refs.msgList.scrollHeight - prevH
        })
        this.hasMore = data.length === 50
      } finally {
        this.loading = false
      }
    },

    async loadDmThreads() {
      const r = await fetch('/api/dm/threads')
      if (r.ok) this.dmThreads = await r.json()
    },

    async send() {
      const input = this.$refs.input
      const text = input.value.trim()
      if (!text) return
      const to = this.conv === 'broadcast' ? '^all' : this.conv
      const channel = this.conv === 'broadcast' ? this.channel : 0
      const r = await fetch('/api/messages/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text, to, channel })
      })
      if (r.ok) {
        input.value = ''
      } else {
        input.style.borderColor = 'var(--danger)'
        setTimeout(() => { input.style.borderColor = '' }, 1500)
      }
    },

    onNewMessage(msg) {
      const isDm = msg.destination && msg.destination !== '^all'
      if (isDm) {
        this.loadDmThreads()
        if (this.conv === msg.node_id || this.conv === msg.destination) {
          this.messages.push(msg)
          this.$nextTick(() => {
            if (this.$refs.msgList) this.$refs.msgList.scrollTop = this.$refs.msgList.scrollHeight
          })
        }
      } else if (this.conv === 'broadcast' && msg.channel === this.channel) {
        this.messages.push(msg)
        this.$nextTick(() => {
          if (this.$refs.msgList) this.$refs.msgList.scrollTop = this.$refs.msgList.scrollHeight
        })
      }
    },

    onAck(msg) {
      this.messages
        .filter(m => m.is_outgoing && !m.ack && m.destination === msg.node_id)
        .forEach(m => { m.ack = 1 })
    },

    async clearHistory() {
      const r = await fetch('/api/messages', { method: 'DELETE' })
      if (r.ok) {
        this.messages = []
        this.dmThreads = []
      }
      this.showConfirm = false
    },
  }
}
</script>
{% endblock %}
