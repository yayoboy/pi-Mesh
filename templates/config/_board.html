{# Sezioni Board: nodo, LoRa, canali, alert, MQTT (bespoke) +
   moduli e config device-level (macro _forms.html). #}
{% import '_forms.html' as f %}
    <!-- NODO -->
    <template x-if="section === 'node'">
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);">Nodo locale</span>
          <span style="font-size:9px;" :style="node.cached ? 'color:var(--muted)' : 'color:#4caf50'"
                x-text="node.cached ? '◌ dalla cache' : '● board online'"></span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;flex-direction:column;gap:3px;">
            <label style="font-size:10px;color:var(--muted);">Porta seriale</label>
            <div style="display:flex;gap:6px;align-items:center;">
              <select x-model="serialPort" @change="saveSerialPort()"
                      style="flex:1;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
                <template x-for="p in serialPorts" :key="p">
                  <option :value="p" x-text="p"></option>
                </template>
              </select>
              <button @click="scanSerialPorts()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:6px 8px;font-size:10px;cursor:pointer;white-space:nowrap;">
                Scan
              </button>
            </div>
            <div x-show="status.serial" x-text="status.serial" style="font-size:10px;"
                 :style="status.serial && status.serial.startsWith('✓') ? 'color:#4caf50' : 'color:#ef4444'"></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:3px;">
            <label style="font-size:10px;color:var(--muted);">Long name</label>
            <input x-model="node.long_name" maxlength="36"
                   style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
          </div>
          <div style="display:flex;flex-direction:column;gap:3px;">
            <label style="font-size:10px;color:var(--muted);">Short name (max 4)</label>
            <input x-model="node.short_name" maxlength="4"
                   style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;width:80px;">
          </div>
          <div style="display:flex;flex-direction:column;gap:3px;">
            <label style="font-size:10px;color:var(--muted);">Ruolo</label>
            <select x-model="node.role"
                    style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
              <option value="CLIENT">Client</option>
              <option value="CLIENT_MUTE">Client (muto)</option>
              <option value="ROUTER">Router</option>
              <option value="ROUTER_CLIENT">Router+Client</option>
              <option value="REPEATER">Repeater</option>
              <option value="TRACKER">Tracker</option>
            </select>
          </div>
          <button @click="saveNode()"
                  :disabled="node.cached || saving.node"
                  style="padding:10px;font-size:12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;"
                  :style="node.cached ? 'background:var(--border);color:var(--muted);cursor:not-allowed;' : 'background:var(--accent);color:#fff;'"
                  x-text="saving.node ? 'Salvataggio...' : (node.cached ? 'Board non connessa' : 'Salva nodo')">
          </button>
          <button @click="factoryModal = true"
                  style="padding:10px;font-size:12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;background:#ef4444;color:#fff;margin-top:4px;">
            Factory Reset
          </button>
          <div x-show="status.node" x-text="status.node" style="font-size:10px;"
               :style="status.node && status.node.startsWith('✓') ? 'color:#4caf50' : 'color:#ef4444'"></div>
        </div>
      </div>
    </template>

    <!-- LORA -->
    <template x-if="section === 'lora'">
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);">LoRa</span>
          <span style="font-size:9px;" :style="lora.cached ? 'color:var(--muted)' : 'color:#4caf50'"
                x-text="lora.cached ? '◌ dalla cache' : '● board online'"></span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;flex-direction:column;gap:3px;">
            <label style="font-size:10px;color:var(--muted);">Regione</label>
            <select x-model="lora.region"
                    style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
              <option value="EU_868">EU 868MHz</option>
              <option value="US">US 915MHz</option>
              <option value="EU_433">EU 433MHz</option>
              <option value="CN">CN 470MHz</option>
            </select>
          </div>
          <div style="display:flex;flex-direction:column;gap:3px;">
            <label style="font-size:10px;color:var(--muted);">Preset modem</label>
            <select x-model="lora.modem_preset"
                    style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
              <option value="LONG_FAST">Long Fast</option>
              <option value="LONG_SLOW">Long Slow</option>
              <option value="MEDIUM_FAST">Medium Fast</option>
              <option value="SHORT_FAST">Short Fast</option>
            </select>
          </div>
          <button @click="saveLora()"
                  :disabled="lora.cached || saving.lora"
                  style="padding:10px;font-size:12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;"
                  :style="lora.cached ? 'background:var(--border);color:var(--muted);cursor:not-allowed;' : 'background:var(--accent);color:#fff;'"
                  x-text="saving.lora ? 'Salvataggio...' : (lora.cached ? 'Board non connessa' : 'Salva LoRa')">
          </button>
          <div x-show="status.lora" x-text="status.lora" style="font-size:10px;"
               :style="status.lora && status.lora.startsWith('✓') ? 'color:#4caf50' : 'color:#ef4444'"></div>
        </div>
      </div>
    </template>

    <!-- CANALI -->
    <template x-if="section === 'channels'">
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);">Canali</span>
          <span style="font-size:9px;" :style="channelsCached ? 'color:var(--muted)' : 'color:#4caf50'"
                x-text="channelsCached ? '◌ dalla cache' : '● board online'"></span>
        </div>
        <template x-if="channels.length === 0">
          <p style="font-size:11px;color:var(--muted);">Nessun canale — board offline o non configurata.</p>
        </template>
        <template x-for="ch in channels" :key="ch.index">
          <div style="background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;">
            <div style="font-size:10px;color:var(--muted);margin-bottom:6px;" x-text="'CH ' + ch.index + ' — ' + ch.role"></div>
            <div style="display:flex;flex-direction:column;gap:6px;">
              <div style="display:flex;flex-direction:column;gap:2px;">
                <label style="font-size:10px;color:var(--muted);">Nome</label>
                <input x-model="ch.name" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:12px;">
              </div>
              <div style="display:flex;flex-direction:column;gap:2px;">
                <label style="font-size:10px;color:var(--muted);">PSK (base64, lascia vuoto per invariato)</label>
                <input x-model="ch.psk_b64" placeholder="lascia vuoto = non cambiare"
                       style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:11px;">
              </div>
              <button @click="saveChannel(ch.index)"
                      :disabled="channelsCached"
                      style="padding:8px;font-size:11px;border:none;border-radius:4px;cursor:pointer;"
                      :style="channelsCached ? 'background:var(--border);color:var(--muted);' : 'background:var(--accent);color:#fff;'"
                      x-text="'Salva CH ' + ch.index">
              </button>
            </div>
          </div>
        </template>
        <div x-show="status.channels" x-text="status.channels" style="font-size:10px;"
             :style="status.channels && status.channels.startsWith('✓') ? 'color:#4caf50' : 'color:#ef4444'"></div>
      </div>
    </template>

    <!-- ===== ALERT ===== -->
    <template x-if="section === 'alert'">
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:10px;">Soglie Alert</div>

        <div style="display:flex;flex-direction:column;gap:10px;">
          <div style="background:var(--panel);border-radius:6px;padding:10px;">
            <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">Nodo offline dopo (minuti)</label>
            <input type="number" x-model.number="alert.node_offline_min" min="5" max="1440" step="5"
                   style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:12px;color:var(--text);">
            <div style="font-size:9px;color:var(--muted);margin-top:2px;">Notifica se un nodo non è più sentito dopo N minuti</div>
          </div>

          <div style="background:var(--panel);border-radius:6px;padding:10px;">
            <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">Batteria scarica sotto (%)</label>
            <input type="number" x-model.number="alert.battery_low" min="5" max="50" step="5"
                   style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:12px;color:var(--text);">
            <div style="font-size:9px;color:var(--muted);margin-top:2px;">Notifica quando la batteria di un nodo scende sotto questa soglia</div>
          </div>

          <div style="background:var(--panel);border-radius:6px;padding:10px;">
            <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">RAM alta sopra (%)</label>
            <input type="number" x-model.number="alert.ram_high" min="50" max="95" step="5"
                   style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:12px;color:var(--text);">
            <div style="font-size:9px;color:var(--muted);margin-top:2px;">Notifica quando la RAM del Raspberry supera questa soglia</div>
          </div>

          <button @click="saveAlert()"
                  :disabled="alert.saving"
                  style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;opacity:1;"
                  :style="alert.saving && 'opacity:0.5;cursor:wait;'"
                  x-text="alert.saving ? 'Salvataggio...' : 'Salva'"></button>
        </div>
      </div>
    </template>

    <!-- MQTT -->
    <template x-if="section === 'mqtt'">
      <div x-init="loadMqtt(); loadMqttStatus()">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);">MQTT</span>
          <span style="font-size:9px;" :style="mqtt.cached ? 'color:var(--muted)' : 'color:#4caf50'"
                x-text="mqtt.cached ? '◌ dalla cache' : '● board online'"></span>
        </div>

        <!-- Bridge status -->
        <div style="padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:6px;">
            <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;"
                 :style="mqttStatus.connected ? 'background:#4caf50' : 'background:#374151'"></div>
            <span style="font-size:11px;" :style="mqttStatus.connected ? 'color:var(--text);font-weight:600;' : 'color:var(--muted);'"
                  x-text="mqttStatus.connected ? 'Connesso a ' + mqttStatus.broker : (mqttStatus.available ? 'Non connesso' : 'paho-mqtt non installato')"></span>
          </div>
        </div>

        <!-- Enable toggle -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text);cursor:pointer;">
            <input type="checkbox" x-model="mqtt.enabled" style="accent-color:var(--accent);">
            Abilita MQTT
          </label>
        </div>

        <template x-if="mqtt.enabled">
          <div style="display:flex;flex-direction:column;gap:8px;">
            <!-- Broker -->
            <div style="display:flex;flex-direction:column;gap:2px;">
              <label style="font-size:10px;color:var(--muted);">Server</label>
              <input x-model="mqtt.address" placeholder="mqtt.meshtastic.org"
                     style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
            </div>

            <!-- Credentials -->
            <div style="display:flex;gap:6px;">
              <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
                <label style="font-size:10px;color:var(--muted);">Username</label>
                <input x-model="mqtt.username" placeholder="meshdev"
                       style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
              </div>
              <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
                <label style="font-size:10px;color:var(--muted);">Password</label>
                <input x-model="mqtt.password" type="password" placeholder="large4cats" autocomplete="new-password"
                       style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
              </div>
            </div>

            <!-- Root topic -->
            <div style="display:flex;flex-direction:column;gap:2px;">
              <label style="font-size:10px;color:var(--muted);">Root Topic</label>
              <input x-model="mqtt.root" placeholder="msh"
                     style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
            </div>

            <!-- Toggle options -->
            <div style="display:flex;flex-direction:column;gap:6px;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;">
              <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);cursor:pointer;">
                <input type="checkbox" x-model="mqtt.json_enabled" style="accent-color:var(--accent);">
                JSON abilitato
              </label>
              <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);cursor:pointer;">
                <input type="checkbox" x-model="mqtt.encryption_enabled" style="accent-color:var(--accent);">
                Crittografia pacchetti
              </label>
              <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);cursor:pointer;">
                <input type="checkbox" x-model="mqtt.tls_enabled" style="accent-color:var(--accent);">
                TLS
              </label>
              <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);cursor:pointer;">
                <input type="checkbox" x-model="mqtt.map_reporting_enabled" style="accent-color:var(--accent);">
                Map reporting
              </label>
              <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);cursor:pointer;">
                <input type="checkbox" x-model="mqtt.proxy_to_client_enabled" style="accent-color:var(--accent);">
                Proxy to client
              </label>
            </div>

            <!-- Save button -->
            <button @click="saveMqtt()" :disabled="mqttSaving || mqtt.cached"
                    style="padding:10px;font-size:12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;"
                    :style="(mqttSaving || mqtt.cached) ? 'background:var(--border);color:var(--muted);cursor:not-allowed;' : 'background:var(--accent);color:#fff;'"
                    x-text="mqttSaving ? 'Salvataggio...' : 'Salva e riavvia bridge'">
            </button>
          </div>
        </template>

        <!-- Status message -->
        <div x-show="status.mqtt" x-text="status.mqtt" style="font-size:10px;margin-top:6px;"
             :style="status.mqtt && status.mqtt.startsWith('✓') ? 'color:#4caf50' : 'color:#ef4444'"></div>
      </div>
    </template>

<!-- EXTERNAL NOTIFICATIONS -->
    <template x-if="section === 'extnotif'">
      <div>
        {{ f.section_title('External Notifications') }}
        <div class="cfg-col">
          {{ f.toggle('extNotif.enabled', 'Abilitato') }}
          {{ f.number('extNotif.output_pin', 'Output Pin GPIO', width='80px') }}
          {{ f.toggle('extNotif.active_high', 'Active High') }}
          {{ f.toggle('extNotif.alert_message', 'Alert su messaggio') }}
          {{ f.toggle('extNotif.alert_bell', 'Alert su bell') }}
          {{ f.toggle('extNotif.use_pwm', 'Usa PWM') }}
          {{ f.number('extNotif.nag_timeout', 'Nag timeout (ms)') }}
          {{ f.save('/api/config/module/external-notification', 'extNotif') }}
        </div>
      </div>
    </template>

    <!-- STORE & FORWARD -->
    <template x-if="section === 'sf'">
      <div>
        {{ f.section_title('Store & Forward') }}
        <div class="cfg-col">
          {{ f.toggle('storeForward.enabled', 'Abilitato') }}
          {{ f.toggle('storeForward.heartbeat', 'Heartbeat') }}
          {{ f.number('storeForward.history_return_max', 'History return max', width='80px') }}
          {{ f.number('storeForward.history_return_window', 'History return window (s)') }}
          {{ f.save('/api/config/module/store-forward', 'storeForward') }}
        </div>
      </div>
    </template>

    <!-- TELEMETRY MODULE -->
    <template x-if="section === 'telmod'">
      <div>
        {{ f.section_title('Telemetry Module') }}
        <div class="cfg-col">
          {{ f.number('telMod.device_update_interval', 'Device update interval (s, 0=default)') }}
          {{ f.number('telMod.environment_update_interval', 'Environment update interval (s, 0=default)') }}
          {{ f.toggle('telMod.environment_measurement_enabled', 'Environment sensors') }}
          {{ f.toggle('telMod.air_quality_enabled', 'Air quality') }}
          {{ f.toggle('telMod.power_measurement_enabled', 'Power measurement') }}
          {{ f.save('/api/config/module/telemetry', 'telMod') }}
        </div>
      </div>
    </template>

    <!-- CANNED MESSAGE MODULE -->
    <template x-if="section === 'cannedmod'">
      <div>
        {{ f.section_title('Canned Message Module') }}
        <div class="hint" style="margin-bottom:8px;">Configurazione lato board (encoder rotativo, bell). Per gestire i testi vedi Config → Canned.</div>
        <div class="cfg-col">
          {{ f.toggle('cannedMod.rotary1_enabled', 'Rotary encoder') }}
          {{ f.toggle('cannedMod.send_bell', 'Invia bell') }}
          {{ f.toggle('cannedMod.free_text_sms_enabled', 'Free text SMS') }}
          {{ f.save('/api/config/module/canned-message', 'cannedMod') }}
        </div>
      </div>
    </template>

    <!-- RANGE TEST -->
    <template x-if="section === 'rangetest'">
      <div>
        {{ f.section_title('Range Test') }}
        <div class="cfg-col">
          {{ f.toggle('rangeTest.enabled', 'Abilitato') }}
          {{ f.number('rangeTest.sender', 'Sender interval (s, 0=off)', width='80px') }}
          {{ f.toggle('rangeTest.save', 'Salva risultati su flash') }}
          {{ f.save('/api/config/module/range-test', 'rangeTest') }}
        </div>
      </div>
    </template>

    <!-- DETECTION SENSOR -->
    <template x-if="section === 'detsensor'">
      <div>
        {{ f.section_title('Detection Sensor') }}
        <div class="cfg-col">
          {{ f.toggle('detSensor.enabled', 'Abilitato') }}
          {{ f.text('detSensor.name', 'Nome sensore') }}
          {{ f.number('detSensor.monitor_pin', 'Monitor pin GPIO', width='80px') }}
          {{ f.number('detSensor.minimum_broadcast_secs', 'Min broadcast (s)', width='80px') }}
          {{ f.number('detSensor.state_broadcast_secs', 'State broadcast (s)', width='80px') }}
          {{ f.toggle('detSensor.use_pullup', 'Pull-up interno') }}
          {{ f.toggle('detSensor.detection_triggered_high', 'Triggered HIGH') }}
          {{ f.save('/api/config/module/detection-sensor', 'detSensor') }}
        </div>
      </div>
    </template>

    <!-- AMBIENT LIGHTING -->
    <template x-if="section === 'ambilight'">
      <div>
        {{ f.section_title('Ambient Lighting (NeoPixel)') }}
        <div class="cfg-col">
          {{ f.toggle('ambLight.led_state', 'LED acceso') }}
          {{ f.number('ambLight.current', 'Corrente (0-31)', width='70px', min=0, max=31) }}
          <div class="cfg-row">
            {{ f.number('ambLight.red', 'R', width='65px', min=0, max=255) }}
            {{ f.number('ambLight.green', 'G', width='65px', min=0, max=255) }}
            {{ f.number('ambLight.blue', 'B', width='65px', min=0, max=255) }}
          </div>
          {{ f.save('/api/config/module/ambient-lighting', 'ambLight') }}
        </div>
      </div>
    </template>

    <!-- NEIGHBOR INFO -->
    <template x-if="section === 'neighinfo'">
      <div>
        {{ f.section_title('Neighbor Info') }}
        <div class="cfg-col">
          {{ f.toggle('neighInfo.enabled', 'Abilitato') }}
          {{ f.number('neighInfo.update_interval', 'Update interval (s, 0=default)') }}
          {{ f.toggle('neighInfo.transmit_over_lora', 'Trasmetti su LoRa') }}
          {{ f.save('/api/config/module/neighbor-info', 'neighInfo') }}
        </div>
      </div>
    </template>

    <!-- SERIAL MODULE -->
    <template x-if="section === 'serial'">
      <div>
        {{ f.section_title('Serial Module') }}
        <div class="cfg-col">
          {{ f.toggle('serialMod.enabled', 'Abilitato') }}
          {{ f.toggle('serialMod.echo', 'Echo') }}
          <div class="cfg-row">
            {{ f.number('serialMod.rxd', 'RXD pin', width='70px') }}
            {{ f.number('serialMod.txd', 'TXD pin', width='70px') }}
          </div>
          {{ f.number('serialMod.timeout', 'Timeout (ms)') }}
          {{ f.select('serialMod.mode', 'Mode', ['DEFAULT', 'SIMPLE', 'PROTO', 'TEXTMSG', 'NMEA', 'CALTOPO']) }}
          {{ f.toggle('serialMod.override_console_serial_port', 'Override console serial') }}
          {{ f.save('/api/config/module/serial', 'serialMod') }}
        </div>
      </div>
    </template>

    <!-- POSITION (device) -->
    <template x-if="section === 'position'">
      <div>
        {{ f.section_title('Posizione / GPS') }}
        <div class="cfg-col">
          {{ f.select('devPosition.gps_mode', 'Modalità GPS', ['DISABLED', 'ENABLED', 'NOT_PRESENT']) }}
          {{ f.number('devPosition.position_broadcast_secs', 'Broadcast posizione (s, 0=default)') }}
