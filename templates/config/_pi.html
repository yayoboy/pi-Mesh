{# Sezioni Pi: GPIO, WiFi, RTC, USB, display SPI/HDMI. #}
    <!-- GPIO -->
    <template x-if="section === 'gpio'">
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);">GPIO / Periferiche</span>
          <button @click="showAddGpio = true; gpioStep = 'type'; gpioForm = {}"
                  style="font-size:10px;padding:4px 8px;background:var(--panel-2);color:var(--accent);border:1px solid var(--border);border-radius:4px;cursor:pointer;">
            + Aggiungi
          </button>
        </div>
        <template x-if="gpio.length === 0">
          <p style="font-size:11px;color:var(--muted);">Nessuna periferica configurata.</p>
        </template>
        <template x-for="dev in gpio" :key="dev.id">
          <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;"
               :style="!dev.enabled ? 'opacity:.55' : ''">
            <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;"
                 :style="dev.enabled ? 'background:var(--ok)' : 'background:var(--muted)'"></div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:11px;color:var(--text);" x-text="dev.name"></div>
              <div style="font-size:10px;color:var(--muted);"
                   x-text="dev.i2c_address ? dev.type + ' · ' + dev.i2c_address : dev.type + (dev.pin_a ? ' · GPIO ' + dev.pin_a : '')"></div>
              <div x-show="dev.action" style="font-size:9px;color:var(--accent);"
                   x-text="dev.action ? '⚡ ' + dev.action.replace(/_/g, ' ') : ''"></div>
            </div>
            <button @click="testGpioDevice(dev.id)"
                    :disabled="!dev.enabled"
                    style="font-size:10px;padding:3px 8px;background:var(--panel-2);color:var(--accent);border:1px solid var(--border);border-radius:4px;cursor:pointer;"
                    :style="!dev.enabled ? 'opacity:.4;cursor:not-allowed' : ''">
              Test
            </button>
            <button @click="deleteGpioDevice(dev.id)"
                    style="font-size:10px;padding:3px 6px;background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:4px;cursor:pointer;">
              ✕
            </button>
          </div>
        </template>
        <div x-show="status.gpio" x-text="status.gpio" style="font-size:10px;margin-top:4px;"
             :style="status.gpio && status.gpio.startsWith('✓') ? 'color:var(--ok)' : 'color:var(--danger)'"></div>

        <!-- Add GPIO Modal -->
        <template x-teleport="body">
          <div x-show="showAddGpio"
               x-transition:enter="transition ease-out duration-150"
               x-transition:enter-start="opacity-0"
               x-transition:enter-end="opacity-100"
               x-transition:leave="transition ease-in duration-100"
               x-transition:leave-start="opacity-100"
               x-transition:leave-end="opacity-0"
               class="fixed inset-0 z-50 flex items-center justify-center p-4"
               @keydown.escape.window="showAddGpio = false"
               style="display:none;">
            <div @click="showAddGpio = false" class="fixed inset-0" style="background:rgba(0,0,0,.65);"></div>
            <div x-show="showAddGpio"
                 x-transition:enter="transition ease-out duration-150"
                 x-transition:enter-start="opacity-0 scale-95"
                 x-transition:enter-end="opacity-100 scale-100"
                 class="relative z-10 w-72 rounded-lg p-4"
                 style="background:var(--panel);border:1px solid var(--border);max-height:calc(100vh - 40px);overflow-y:auto;">

              <!-- Step: type selection -->
              <template x-if="gpioStep === 'type'">
                <div>
                  <h3 style="font-size:13px;font-weight:700;color:var(--text);margin:0 0 8px;">Aggiungi periferica</h3>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                    <template x-for="t in gpioTypes" :key="t.id">
                      <button @click="gpioForm = {type: t.id, enabled: 1, i2c_bus: 1, config_json: '{}'}; gpioStep = 'form'"
                              style="padding:10px 6px;border-radius:6px;cursor:pointer;text-align:center;font-size:11px;background:var(--bg);border:1px solid var(--border);color:var(--text);">
                        <div x-text="t.icon" style="font-size:16px;"></div>
                        <div x-text="t.label" style="margin-top:2px;"></div>
                        <div x-text="t.sub" style="font-size:9px;color:var(--muted);"></div>
                      </button>
                    </template>
                  </div>
                  <button @click="showAddGpio = false" style="width:100%;margin-top:10px;padding:8px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;">Annulla</button>
                </div>
              </template>

              <!-- Step: form -->
              <template x-if="gpioStep === 'form'">
                <div style="display:flex;flex-direction:column;gap:8px;">
                  <div style="display:flex;align-items:center;gap:8px;">
                    <button @click="gpioStep = 'type'" style="background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;padding:0;">←</button>
                    <span style="font-size:13px;font-weight:700;color:var(--text);"
                          x-text="(gpioTypes.find(t => t.id === gpioForm.type)?.icon || '') + ' ' + (gpioTypes.find(t => t.id === gpioForm.type)?.label || '')"></span>
                  </div>

                  <div style="display:flex;flex-direction:column;gap:3px;">
                    <label style="font-size:10px;color:var(--muted);">Nome</label>
                    <input x-model="gpioForm.name" placeholder="es. BME280 esterno"
                           style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
                  </div>

                  <!-- I2C fields -->
                  <template x-if="gpioForm.type === 'i2c_sensor' || gpioForm.type === 'rtc'">
                    <div style="display:flex;flex-direction:column;gap:6px;">
                      <div style="display:flex;flex-direction:column;gap:3px;">
                        <label style="font-size:10px;color:var(--muted);">I2C Address</label>
                        <div style="display:flex;gap:6px;align-items:center;">
                          <input x-model="gpioForm.i2c_address" placeholder="0x76"
                                 style="flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
                          <button @click="scanI2C(gpioForm.i2c_bus || 1)"
                                  style="padding:7px 10px;background:var(--panel-2);color:var(--accent);border:1px solid var(--border);border-radius:4px;font-size:11px;white-space:nowrap;cursor:pointer;"
                                  x-text="i2cScanning ? '...' : '🔍 Scan'">
                          </button>
                        </div>
                        <template x-if="i2cScanResults.length > 0">
                          <div style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px;display:flex;gap:6px;flex-wrap:wrap;">
                            <template x-for="res in i2cScanResults" :key="res.address">
                              <button @click="gpioForm.i2c_address = res.address; if(res.known_device) gpioForm.sensor_type = res.known_device"
                                      style="padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;"
                                      :style="gpioForm.i2c_address === res.address
                                        ? 'background:var(--panel-2);border:2px solid var(--accent);color:var(--accent);'
                                        : 'background:var(--panel);border:1px solid var(--border);color:var(--text);'">
                                <span x-text="res.address"></span>
                                <span x-show="res.known_device" x-text="' ' + res.known_device" style="color:var(--muted);font-size:9px;"></span>
                              </button>
                            </template>
                          </div>
                        </template>
                      </div>
                      <div style="display:flex;flex-direction:column;gap:3px;">
                        <label style="font-size:10px;color:var(--muted);">Modello</label>
                        <select x-model="gpioForm.sensor_type"
                                style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
                          <option value="BME280">BME280</option>
                          <option value="BMP180">BMP180</option>
                          <option value="SHT31">SHT31</option>
                          <option value="AHT20">AHT20</option>
                          <option value="HTU21D">HTU21D</option>
                          <option value="DS3231">DS3231 (RTC)</option>
                          <option value="DS1307">DS1307 (RTC)</option>
                          <option value="SSD1306">SSD1306 (display)</option>
                        </select>
                      </div>
                    </div>
                  </template>

                  <!-- GPIO pin fields (non-I2C) -->
                  <template x-if="gpioForm.type !== 'i2c_sensor' && gpioForm.type !== 'rtc'">
                    <div style="display:flex;flex-direction:column;gap:6px;">
                      <div style="display:flex;flex-direction:column;gap:3px;">
                        <label style="font-size:10px;color:var(--muted);"
                               x-text="gpioForm.type === 'encoder' ? 'Pin A (CLK)' : 'Pin GPIO (BCM)'"></label>
                        <div style="position:relative;">
                          <button @click="pinDropdownOpen = !pinDropdownOpen"
                                  style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;text-align:left;cursor:pointer;"
                                  x-text="gpioForm.pin_a != null ? 'GPIO ' + gpioForm.pin_a + (usedPins[gpioForm.pin_a] ? ' ⚠' : '') : '— seleziona —'">
                          </button>
                          <div x-show="pinDropdownOpen" @click.outside="pinDropdownOpen = false"
                               style="position:absolute;top:100%;left:0;right:0;z-index:100;background:var(--panel);border:1px solid var(--border);border-radius:4px;max-height:160px;overflow-y:auto;">
                            <template x-for="pin in allPins" :key="pin">
                              <div @click="gpioForm.pin_a = pin; pinDropdownOpen = false"
                                   style="padding:6px 10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:12px;"
                                   :style="getPinStyle(pin, gpioForm.pin_a)">
                                <span x-text="'GPIO ' + pin"></span>
                                <span style="font-size:9px;"
                                      x-text="usedPins[pin] ? usedPins[pin] : (reservedPins[pin] ? reservedPins[pin] : '')"></span>
                              </div>
                            </template>
                          </div>
                        </div>
                      </div>
                      <template x-if="gpioForm.type === 'encoder'">
                        <div style="display:flex;flex-direction:column;gap:3px;">
                          <label style="font-size:10px;color:var(--muted);">Pin B (DT)</label>
                          <div style="position:relative;">
                            <button @click="pinDropdownOpenB = !pinDropdownOpenB"
                                    style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;text-align:left;cursor:pointer;"
                                    x-text="gpioForm.pin_b != null ? 'GPIO ' + gpioForm.pin_b : '— seleziona —'">
                            </button>
                            <div x-show="pinDropdownOpenB" @click.outside="pinDropdownOpenB = false"
                                 style="position:absolute;top:100%;left:0;right:0;z-index:100;background:var(--panel);border:1px solid var(--border);border-radius:4px;max-height:140px;overflow-y:auto;">
                              <template x-for="pin in allPins" :key="pin">
                                <div @click="gpioForm.pin_b = pin; pinDropdownOpenB = false"
                                     style="padding:6px 10px;display:flex;justify-content:space-between;cursor:pointer;font-size:12px;"
                                     :style="getPinStyle(pin, gpioForm.pin_b)">
                                  <span x-text="'GPIO ' + pin"></span>
                                  <span style="font-size:9px;" x-text="usedPins[pin] || reservedPins[pin] || ''"></span>
                                </div>
                              </template>
                            </div>
                          </div>
                        </div>
                      </template>
                      <template x-if="gpioForm.type === 'encoder'">
                        <div style="display:flex;flex-direction:column;gap:3px;">
                          <label style="font-size:10px;color:var(--muted);">Azione</label>
                          <select x-model="gpioForm.action"
                                  style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
                            <option value="scroll_pages">Scorri tra pagine</option>
                            <option value="scroll_messages">Scorri messaggi</option>
                            <option value="scroll_nodes">Scorri lista nodi</option>
                            <option value="change_channel">Cambia canale</option>
                            <option value="zoom_map">Zoom mappa</option>
                            <option value="brightness">Luminosità display</option>
                            <option value="volume_buzzer">Volume buzzer</option>
                          </select>
                        </div>
                      </template>
                      <template x-if="gpioForm.type === 'button'">
                        <div style="display:flex;flex-direction:column;gap:3px;">
                          <label style="font-size:10px;color:var(--muted);">Azione</label>
                          <select x-model="gpioForm.action"
                                  style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
                            <option value="next_page">Pagina successiva</option>
                            <option value="prev_page">Pagina precedente</option>
                            <option value="send_position">Invia posizione</option>
                            <option value="toggle_buzzer">Toggle buzzer</option>
                            <option value="panic">Allarme (broadcast)</option>
                          </select>
                        </div>
                      </template>
                      <template x-if="gpioForm.type === 'led'">
                        <div style="display:flex;flex-direction:column;gap:3px;">
                          <label style="font-size:10px;color:var(--muted);">Indicatore</label>
                          <select x-model="gpioForm.action"
                                  style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
                            <option value="new_message">Nuovo messaggio</option>
                            <option value="connection_status">Stato connessione</option>
                            <option value="gps_fix">Fix GPS</option>
                          </select>
                        </div>
                      </template>
                    </div>
                  </template>

                  <div style="display:flex;align-items:center;gap:8px;">
                    <input type="checkbox" x-model="gpioForm.enabled" :true-value="1" :false-value="0" style="width:18px;height:18px;">
                    <label style="font-size:11px;color:var(--text);">Abilitato</label>
                  </div>

                  <div style="display:flex;gap:8px;margin-top:4px;">
                    <button @click="showAddGpio = false" style="flex:1;padding:10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;">Annulla</button>
                    <button @click="saveGpioDevice()" style="flex:1;padding:10px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:600;cursor:pointer;">Salva</button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- WIFI -->
    <template x-if="section === 'wifi'">
      <div x-init="loadWifiStatus(); loadWifiSaved(); loadApStatus()">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:10px;">WiFi Pi</div>

        <!-- Current status -->
        <div style="padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-bottom:10px;">
          <template x-if="wifiStatus.connected">
            <div>
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
                <div style="width:8px;height:8px;border-radius:50%;background:var(--ok);flex-shrink:0;"></div>
                <span style="font-size:11px;color:var(--text);font-weight:600;" x-text="wifiStatus.ssid"></span>
              </div>
              <div style="font-size:10px;color:var(--muted);" x-text="'IP: ' + wifiStatus.ip + ' (' + (wifiStatus.method === 'manual' ? 'Statico' : 'DHCP') + ')'"></div>
            </div>
          </template>
          <template x-if="!wifiStatus.connected">
            <div style="display:flex;align-items:center;gap:6px;">
              <div style="width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;"></div>
              <span style="font-size:11px;color:var(--muted);">Non connesso</span>
            </div>
          </template>
        </div>

        <!-- AP Sharing -->
        <div style="padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-bottom:10px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div style="font-size:11px;color:var(--text);font-weight:600;">Hotspot Sharing</div>
              <div style="font-size:9px;color:var(--muted);" x-text="apActive ? 'SSID: pi-mesh-portal · ' + (apIp || '10.42.0.1') + ':8080' : 'Condividi pi-Mesh via WiFi AP'"></div>
            </div>
            <button @click="toggleAP()"
                    style="padding:5px 12px;font-size:10px;border-radius:4px;cursor:pointer;border:1px solid;"
                    :style="apActive
                      ? 'background:var(--danger);color:var(--danger);border-color:var(--danger)'
                      : 'background:var(--panel-2);color:var(--accent);border-color:var(--border)'"
                    x-text="apToggling ? '...' : (apActive ? 'Disattiva' : 'Attiva')">
            </button>
          </div>
        </div>

        <!-- Scan + connect -->
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <button @click="scanWifi()" style="flex:1;padding:8px;font-size:11px;background:var(--panel-2);color:var(--accent);border:1px solid var(--border);border-radius:4px;cursor:pointer;"
                  x-text="wifiScanning ? 'Scansione...' : 'Scan reti'">
          </button>
        </div>
        <template x-if="wifiNetworks.length > 0">
          <div style="background:var(--panel);border:1px solid var(--border);border-radius:6px;max-height:100px;overflow-y:auto;margin-bottom:8px;">
            <template x-for="net in wifiNetworks" :key="net.ssid">
              <div @click="wifi.ssid = net.ssid"
                   style="padding:6px 10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:1px solid var(--border);"
                   :style="wifi.ssid === net.ssid ? 'background:var(--panel-2);' : ''">
                <span style="font-size:11px;color:var(--text);" x-text="net.ssid"></span>
                <span style="font-size:10px;color:var(--muted);" x-text="net.signal + '% · ' + net.security"></span>
              </div>
            </template>
          </div>
        </template>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;">
          <input x-model="wifi.ssid" placeholder="SSID" style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
          <input x-model="wifi.password" type="password" placeholder="Password" autocomplete="new-password"
                 style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
          <button @click="connectWifi()" style="padding:10px;font-size:12px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;"
                  x-text="wifiConnecting ? 'Connessione...' : 'Connetti'">
          </button>
        </div>

        <!-- Saved networks -->
        <template x-if="wifiSaved.length > 0">
          <div>
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:6px;">Reti salvate</div>
            <div style="background:var(--panel);border:1px solid var(--border);border-radius:6px;max-height:150px;overflow-y:auto;margin-bottom:14px;">
              <template x-for="net in wifiSaved" :key="net.name">
                <div style="padding:8px 10px;border-bottom:1px solid var(--border);">
                  <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-size:12px;color:var(--text);font-weight:600;" x-text="net.ssid"></span>
                    <button @click="deleteWifiSaved(net.name)" style="background:none;border:none;color:var(--danger);font-size:10px;cursor:pointer;padding:2px 6px;">Rimuovi</button>
                  </div>
                  <div style="font-size:10px;color:var(--muted);margin-top:2px;">
                    <span x-text="net.name !== net.ssid ? 'Profilo: ' + net.name + ' · ' : ''"></span>
                    <span x-text="net.psk ? 'PSK: ' + net.psk : 'Aperta'"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- IP Configuration -->
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:6px;">Configurazione IP</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div style="display:flex;gap:10px;align-items:center;">
            <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text);cursor:pointer;">
              <input type="radio" value="auto" x-model="wifiIp.method" style="accent-color:var(--accent);">
              DHCP
            </label>
            <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text);cursor:pointer;">
              <input type="radio" value="manual" x-model="wifiIp.method" style="accent-color:var(--accent);">
              IP Statico
            </label>
          </div>
          <template x-if="wifiIp.method === 'manual'">
            <div style="display:flex;flex-direction:column;gap:6px;">
              <input x-model="wifiIp.address" placeholder="Indirizzo (es. 192.168.1.100/24)"
                     style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
              <input x-model="wifiIp.gateway" placeholder="Gateway (es. 192.168.1.1)"
                     style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
              <input x-model="wifiIp.dns" placeholder="DNS (es. 8.8.8.8)"
                     style="background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;">
            </div>
          </template>
          <button @click="saveWifiIp()" :disabled="wifiIpSaving || !wifiStatus.connected"
                  style="padding:10px;font-size:12px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;"
                  :style="(!wifiStatus.connected || wifiIpSaving) ? 'opacity:0.5;cursor:not-allowed;' : ''"
                  x-text="wifiIpSaving ? 'Salvataggio...' : 'Applica IP'">
          </button>
        </div>

        <!-- Status message -->
        <div x-show="status.wifi" x-text="status.wifi" style="font-size:10px;margin-top:6px;"
             :style="status.wifi && status.wifi.startsWith('✓') ? 'color:var(--ok)' : 'color:var(--danger)'"></div>
      </div>
    </template>

    <!-- RTC -->
    <template x-if="section === 'rtc'">
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:10px;">RTC I2C</div>
        <div style="padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;">
          <template x-if="rtcStatus === null">
            <span style="font-size:11px;color:var(--muted);">Caricamento...</span>
          </template>
          <template x-if="rtcStatus !== null && rtcStatus.configured">
            <div>
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                <div style="width:8px;height:8px;border-radius:50%;background:var(--ok);flex-shrink:0;"></div>
                <span style="font-size:11px;color:var(--text);font-weight:600;">Attivo</span>
                <span style="font-size:10px;color:var(--muted);" x-text="rtcStatus.model ? '· ' + rtcStatus.model.toUpperCase() : ''"></span>
              </div>
              <div x-show="rtcStatus.device" style="font-size:10px;color:var(--muted);" x-text="rtcStatus.device + (rtcStatus.time ? ' · ' + rtcStatus.time : '')"></div>
              <div x-show="!rtcStatus.device" style="font-size:10px;color:var(--warn);">Driver configurato — riavvia il Pi per attivare.</div>
            </div>
          </template>
          <template x-if="rtcStatus !== null && !rtcStatus.configured">
            <div style="display:flex;align-items:center;gap:6px;">
              <div style="width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;"></div>
              <span style="font-size:11px;color:var(--muted);">Non configurato</span>
            </div>
          </template>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px;">Modello RTC</div>
        <select x-model="rtcModel"
                style="width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:7px 8px;font-size:12px;margin-bottom:10px;">
          <option value="ds3231">DS3231 (consigliato)</option>
          <option value="ds1307">DS1307</option>
          <option value="pcf8523">PCF8523</option>
          <option value="pcf8563">PCF8563</option>
          <option value="rv3028">RV3028</option>
          <option value="mcp7940x">MCP7940X</option>
          <option value="abx80x">ABx80x</option>
        </select>
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">Comando di setup (copia e incolla nel terminale)</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <code style="flex:1;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:10px;color:var(--accent);word-break:break-all;"
                x-text="'sudo bash ~/pi-Mesh/scripts/setup-rtc.sh ' + rtcModel"></code>
          <button @click="copyRtcCmd()"
                  style="padding:7px 10px;background:var(--panel-2);color:var(--accent);border:1px solid var(--border);border-radius:4px;font-size:11px;cursor:pointer;white-space:nowrap;"
                  x-text="rtcCopied ? '✓' : 'Copia'"></button>
        </div>
        <p style="font-size:10px;color:var(--muted);margin-top:8px;">Richiede root. Riavvia il Pi dopo l'esecuzione.</p>
      </div>
    </template>

    <!-- USB / ARCHIVIAZIONE -->
    <template x-if="section === 'usb'">
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:10px;">Archiviazione USB</div>

        <!-- Loading -->
        <div x-show="usb.loading" style="font-size:11px;color:var(--muted);">Rilevamento USB...</div>

        <!-- No USB -->
        <div x-show="!usb.loading && !usb.connected" style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;align-items:center;gap:6px;">
            <div style="width:8px;height:8px;border-radius:50%;background:var(--muted);"></div>
            <span style="font-size:11px;color:var(--muted);">Nessuna USB rilevata</span>
          </div>
          <p style="font-size:10px;color:var(--muted);">Collega un dispositivo USB per spostare tile mappa e ridurre l'usura della SD.</p>
          <button @click="loadUsb()" style="padding:8px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--panel);color:var(--text);cursor:pointer;">
            Riprova rilevamento
          </button>
        </div>

        <!-- USB Connected -->
        <template x-if="!usb.loading && usb.connected">
          <div style="display:flex;flex-direction:column;gap:10px;">
            <template x-for="dev in usb.devices" :key="dev.dev">
              <div style="background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px;">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
                  <div style="width:8px;height:8px;border-radius:50%;background:var(--ok);"></div>
                  <span style="font-size:12px;font-weight:600;" x-text="dev.name"></span>
                  <span style="font-size:10px;color:var(--muted);margin-left:auto;" x-text="dev.size"></span>
                </div>
                <div style="display:flex;gap:12px;font-size:10px;color:var(--muted);margin-bottom:6px;">
                  <span x-text="'FS: ' + dev.fstype"></span>
                  <span x-text="'Libero: ' + (dev.free_mb > 1024 ? (dev.free_mb/1024).toFixed(1) + ' GB' : dev.free_mb + ' MB')"></span>
                </div>
                <!-- Usage bar -->
                <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
                  <div style="height:100%;border-radius:2px;transition:width 0.3s;"
                       :style="'width:' + (dev.total_mb ? Math.round(dev.used_mb/dev.total_mb*100) : 0) + '%;background:' + (dev.free_mb < 100 ? 'var(--danger)' : 'var(--accent)')"></div>
                </div>
              </div>
            </template>

            <!-- Tile location -->
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
              <div>
                <div style="font-size:11px;font-weight:600;">Tile mappa</div>
                <div style="font-size:10px;color:var(--muted);" x-text="usb.tiles_location === 'usb' ? 'Attualmente su USB' : 'Attualmente su SD'"></div>
              </div>
              <span style="font-size:10px;padding:2px 8px;border-radius:4px;"
                    :style="usb.tiles_location === 'usb' ? 'background:var(--panel-2);color:var(--ok)' : 'background:var(--panel);color:var(--muted)'"
                    x-text="usb.tiles_location === 'usb' ? 'USB' : 'SD'"></span>
            </div>

            <!-- Move / Restore button -->
            <button x-show="usb.tiles_location === 'sd'"
                    @click="moveTilesToUsb()"
                    :disabled="usb.moving"
                    style="padding:10px;font-size:12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;background:var(--accent);color:#fff;"
                    x-text="usb.moving ? 'Spostamento...' : 'Sposta tile su USB'">
            </button>
            <button x-show="usb.tiles_location === 'usb'"
                    @click="restoreTilesToSd()"
                    :disabled="usb.moving"
                    style="padding:10px;font-size:12px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-weight:600;background:var(--panel);color:var(--text);"
                    x-text="usb.moving ? 'Ripristino...' : 'Riporta tile su SD'">
            </button>

            <button @click="loadUsb()" style="padding:6px;font-size:10px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;">
              Aggiorna stato
            </button>
          </div>
        </template>
      </div>
    </template>

    <!-- ===== DISPLAY ===== -->
    <template x-if="section === 'display'">
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:10px;">Display</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div style="background:var(--panel);border-radius:6px;padding:10px;">
            <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:6px;">Rotazione</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
              <button @click="display.rotation = 0"   style="flex:1;min-height:36px;font-size:12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);" :style="display.rotation===0   ? 'background:var(--accent);color:#fff;border-color:var(--accent);' : 'background:var(--panel);color:var(--text);'">0°</button>
              <button @click="display.rotation = 90"  style="flex:1;min-height:36px;font-size:12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);" :style="display.rotation===90  ? 'background:var(--accent);color:#fff;border-color:var(--accent);' : 'background:var(--panel);color:var(--text);'">90°</button>
              <button @click="display.rotation = 180" style="flex:1;min-height:36px;font-size:12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);" :style="display.rotation===180 ? 'background:var(--accent);color:#fff;border-color:var(--accent);' : 'background:var(--panel);color:var(--text);'">180°</button>
              <button @click="display.rotation = 270" style="flex:1;min-height:36px;font-size:12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);" :style="display.rotation===270 ? 'background:var(--accent);color:#fff;border-color:var(--accent);' : 'background:var(--panel);color:var(--text);'">270°</button>
            </div>
            <button @click="saveRotation()"
                    :disabled="display.savingRotation"
                    style="width:100%;min-height:32px;font-size:11px;font-weight:600;border-radius:4px;cursor:pointer;background:var(--accent);color:#fff;border:none;"
                    :style="display.savingRotation && 'opacity:0.5;cursor:wait;'"
                    x-text="display.savingRotation ? 'Salvataggio...' : 'Salva e Riavvia'"></button>
            <div x-show="display.rotationStatus" style="font-size:11px;color:var(--muted);margin-top:4px;" x-text="display.rotationStatus"></div>
          </div>
          <div style="background:var(--panel);border-radius:6px;padding:10px;">
            <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:6px;">Luminosità schermo</label>
            <div style="display:flex;align-items:center;gap:10px;">
              <input type="range" min="0" max="255" step="1" x-model.number="display.brightness"
                     style="flex:1;accent-color:var(--accent);">
              <span style="font-size:12px;color:var(--text);min-width:28px;text-align:right;" x-text="display.brightness"></span>
            </div>
            <div style="font-size:9px;color:var(--muted);margin-top:4px;">0 = spento, 255 = massima luminosità</div>
          </div>
          <button @click="saveDisplay()"
                  :disabled="display.saving"
                  style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;"
                  :style="display.saving && 'opacity:0.5;cursor:wait;'"
                  x-text="display.saving ? 'Salvataggio...' : 'Salva'"></button>
          <div x-show="display.status" style="font-size:11px;color:var(--muted);" x-text="display.status"></div>
        </div>
      </div>
    </template>
