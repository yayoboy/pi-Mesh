{% extends "base.html" %}
{% block content %}
<div x-data="logPage()" x-init="init()" class="h-full flex flex-col overflow-hidden">

  <!-- Header -->
  <div class="shrink-0" style="border-bottom:1px solid var(--border);">
    <div class="flex items-center justify-between px-3 py-2" style="font-size:11px;">
      <span style="color:var(--accent);font-weight:600;">Log board</span>
      <div class="flex items-center gap-3">
        <span class="w-2 h-2 rounded-full"
              :style="`background:${connected ? '#4caf50' : '#374151'}`"></span>
        <span style="color:var(--muted);font-size:10px;" x-text="filtered.length + '/' + entries.length"></span>
        <!-- Auto-scroll toggle -->
        <button @click="autoScroll = !autoScroll" :title="autoScroll ? 'Auto-scroll ON' : 'Auto-scroll OFF'"
                style="background:none;border:none;cursor:pointer;padding:0;"
                :style="autoScroll ? 'color:var(--accent)' : 'color:var(--muted)'">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
          </svg>
        </button>
        <!-- Export -->
        <button @click="exportLog()" title="Esporta log"
                style="color:var(--muted);background:none;border:none;cursor:pointer;padding:0;">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
        </button>
        <!-- Clear -->
        <button @click="entries = []" title="Cancella log"
                style="color:var(--muted);background:none;border:none;cursor:pointer;padding:0;">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Search + Filter bar -->
    <div class="flex items-center gap-2 px-3 pb-2" style="font-size:10px;">
      <input type="text" x-model.debounce.200ms="search" placeholder="Cerca..."
             style="flex:1;background:var(--panel);border:1px solid var(--border);border-radius:4px;
                    padding:3px 8px;color:var(--text);font-size:10px;outline:none;">
      <template x-for="p in portnumList" :key="p">
        <button @click="toggleFilter(p)"
                :style="activeFilters.has(p)
                  ? 'background:var(--accent);color:#fff;border-color:var(--accent)'
                  : 'background:var(--panel);color:var(--muted);border-color:var(--border)'"
                style="border:1px solid;border-radius:3px;padding:1px 5px;font-size:9px;cursor:pointer;white-space:nowrap;"
                x-text="shortPortnum(p)">
        </button>
      </template>
    </div>
  </div>

  <!-- Log entries -->
  <div class="flex-1 overflow-y-auto font-mono" style="font-size:10px;" id="log-scroll"
       @scroll="onScroll">
    <template x-for="(e, i) in filtered" :key="e._idx">
      <div class="px-3 py-1 flex gap-2" style="border-bottom:1px solid rgba(26,34,51,0.5);">
        <span style="color:var(--muted);flex-shrink:0;" x-text="fmtTime(e.ts)"></span>
        <span style="color:var(--accent);flex-shrink:0;" x-text="e.from || '?'"></span>
        <span :style="'color:' + portnumColor(e.portnum)" x-text="shortPortnum(e.portnum || e.type || '')"></span>
        <span style="color:var(--text);opacity:0.7;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
              x-text="e.summary || ''"></span>
        <span style="color:var(--muted);flex-shrink:0;"
              x-show="e.snr != null" x-text="e.snr != null ? e.snr + 'dB' : ''"></span>
      </div>
    </template>
    <template x-if="entries.length === 0">
      <div class="flex items-center justify-center h-24" style="color:var(--muted);">
        In attesa di pacchetti...
      </div>
    </template>
    <template x-if="entries.length > 0 && filtered.length === 0">
      <div class="flex items-center justify-center h-24" style="color:var(--muted);">
        Nessun risultato
      </div>
    </template>
  </div>
</div>

<script>
function logPage() {
  return {
    entries: [],
    connected: false,
    es: null,
    search: '',
    activeFilters: new Set(),
    autoScroll: true,
    _scrollEl: null,
    _idx: 0,

    get portnumList() {
      var seen = new Set()
      this.entries.forEach(function(e) { if (e.portnum) seen.add(e.portnum) })
      return Array.from(seen).sort()
    },

    get filtered() {
      var self = this
      var q = self.search.toLowerCase()
      return self.entries.filter(function(e) {
        if (self.activeFilters.size > 0 && e.portnum && !self.activeFilters.has(e.portnum)) return false
        if (!q) return true
        var haystack = (e.from || '') + ' ' + (e.portnum || e.type || '') + ' ' + (e.snr || '') + ' ' + (e.summary || '')
        return haystack.toLowerCase().indexOf(q) >= 0
      })
    },

    init() {
      this._scrollEl = document.getElementById('log-scroll')
      this.connect()
    },

    connect() {
      this.es = new EventSource('/api/log/stream')
      this.es.onopen = () => { this.connected = true }
      this.es.onmessage = (e) => {
        try {
          var entry = JSON.parse(e.data)
          entry._idx = this._idx++
          this.entries.unshift(entry)
          if (this.entries.length > 500) this.entries.pop()
          if (this.autoScroll) {
            this.$nextTick(() => {
              if (this._scrollEl) this._scrollEl.scrollTop = 0
            })
          }
        } catch(_) {}
      }
      this.es.onerror = () => {
        this.connected = false
        this.es.close()
        setTimeout(() => this.connect(), 5000)
      }
    },

    onScroll() {
      // Disable auto-scroll if user scrolls away from top
      if (this._scrollEl && this._scrollEl.scrollTop > 50) {
        this.autoScroll = false
      }
    },

    toggleFilter(p) {
      if (this.activeFilters.has(p)) {
        this.activeFilters.delete(p)
      } else {
        this.activeFilters.add(p)
      }
      // Force reactivity
      this.activeFilters = new Set(this.activeFilters)
    },

    shortPortnum(p) {
      if (!p) return ''
      return p.replace('_APP', '').replace('TELEMETRY', 'TELEM').replace('NODEINFO', 'NODE')
    },

    portnumColor(p) {
      if (!p) return 'var(--text)'
      if (p.indexOf('TEXT') >= 0) return '#4caf50'
      if (p.indexOf('POSITION') >= 0) return '#4a9eff'
      if (p.indexOf('NODEINFO') >= 0) return '#fb8c00'
      if (p.indexOf('TELEMETRY') >= 0) return '#ab47bc'
      if (p.indexOf('ROUTING') >= 0) return '#78909c'
      if (p.indexOf('TRACEROUTE') >= 0) return '#ffd54f'
      return 'var(--text)'
    },

    exportLog() {
      var lines = this.filtered.map(function(e) {
        var ts = e.ts ? new Date(e.ts * 1000).toISOString() : ''
        return ts + '\t' + (e.from || '?') + '\t' + (e.portnum || e.type || '') +
          (e.summary ? '\t' + e.summary : '') +
          (e.snr != null ? '\tSNR:' + e.snr : '') +
          (e.hop_limit != null ? '\tHops:' + e.hop_limit : '')
      })
      var blob = new Blob([lines.join('\n')], { type: 'text/plain' })
      var a = document.createElement('a')
      a.href = URL.createObjectURL(blob)
      a.download = 'pimesh-log-' + new Date().toISOString().slice(0,10) + '.txt'
      a.click()
      URL.revokeObjectURL(a.href)
    },

    fmtTime(ts) {
      if (!ts) return '--:--:--'
      var d = new Date(ts * 1000)
      return d.toTimeString().slice(0,8)
    }
  }
}
</script>
{% endblock %}
