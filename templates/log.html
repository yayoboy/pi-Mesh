{% extends "base.html" %}
{% block content %}
<div id="log-wrap" style="display:flex;flex-direction:column;height:100%;gap:8px;padding:8px;box-sizing:border-box">

  <!-- Row 1: Board / Pi tab toggle -->
  <div style="display:flex;flex-shrink:0;border-bottom:1px solid var(--border)">
    <button id="btn-board" class="log-tab active" onclick="showLog('board')">Board</button>
    <button id="btn-pi"    class="log-tab"        onclick="showLog('pi')">Pi</button>
  </div>

  <!-- Row 2: search + icon-only filter/action buttons -->
  <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
    <!-- Text search -->
    <input id="log-search" type="search" placeholder="Cerca…"
      style="flex:1;min-width:0;font-size:11px;padding:3px 8px;border-radius:6px;
             border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none">

    <!-- Level filter: ALL (3 lines), WARN+ (triangle), ERR (circle-X) -->
    <button id="btn-all"   class="log-icon-btn active" onclick="_setLevel('all')"   title="Tutti">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="2" y1="4" x2="12" y2="4"/><line x1="2" y1="7" x2="12" y2="7"/><line x1="2" y1="10" x2="12" y2="10"/>
      </svg>
    </button>
    <button id="btn-warn"  class="log-icon-btn"        onclick="_setLevel('warn')"  title="WARN+">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 2 L13 12 H1 Z"/><line x1="7" y1="6" x2="7" y2="9"/><circle cx="7" cy="10.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
    </button>
    <button id="btn-error" class="log-icon-btn"        onclick="_setLevel('error')" title="ERR">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="7" cy="7" r="5.5"/><line x1="5" y1="5" x2="9" y2="9"/><line x1="9" y1="5" x2="5" y2="9"/>
      </svg>
    </button>

    <!-- Pause (two vertical bars) -->
    <button id="btn-pause" class="log-icon-btn" onclick="_togglePause()" title="Pausa auto-scroll">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
        <rect x="3" y="2" width="3" height="10" rx="1"/><rect x="8" y="2" width="3" height="10" rx="1"/>
      </svg>
    </button>

    <!-- Download (arrow down) -->
    <button class="log-icon-btn" onclick="downloadLog()" title="Scarica log">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="7" y1="2" x2="7" y2="9"/><polyline points="4,7 7,10 10,7"/><line x1="2" y1="12" x2="12" y2="12"/>
      </svg>
    </button>

    <!-- Clear (trash) -->
    <button class="log-icon-btn" onclick="clearLog()" title="Pulisci log">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="2,4 3,4 12,4"/><path d="M5 4V3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1"/><path d="M11 4l-.8 7.2A1 1 0 0 1 9.2 12H4.8a1 1 0 0 1-1-.8L3 4"/>
      </svg>
    </button>
  </div>

  <div id="log-list" style="flex:1;overflow-y:auto;font-family:monospace;font-size:11px;line-height:1.5"></div>

</div>

<style>
.log-tab{
  flex:1;background:var(--surface);color:var(--text-muted,#888);
  border:none;border-bottom:2px solid transparent;
  min-height:36px;font-size:12px;cursor:pointer;
}
.log-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.log-icon-btn{
  width:32px;height:32px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);color:var(--text);
  border:1px solid var(--border);border-radius:6px;
  cursor:pointer;padding:0;
}
.log-icon-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.log-entry{padding:2px 4px;border-bottom:1px solid var(--border)}
.log-entry.warn{color:#f0a030}
.log-entry.error{color:#e05050}
.log-entry.info{color:var(--text)}
</style>

<script>
(function(){
  let _src      = 'board'
  let _level    = 'all'   // 'all' | 'warn' | 'error'
  let _paused   = false

  // ── helpers ──────────────────────────────────────────────────────────────

  function ts(t){ return new Date(t*1000).toLocaleTimeString('it',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) }

  function makeEntry(e){
    const div = document.createElement('div')
    div.className = 'log-entry ' + (e.level || 'info')
    div.textContent = ts(e.ts) + ' [' + (e.level||'info').toUpperCase() + '] ' + e.msg
    return div
  }

  // Apply search text + level filter to every child of log-list
  function _applyFilters(){
    const list = document.getElementById('log-list')
    if(!list) return
    const q = (document.getElementById('log-search').value || '').toLowerCase()
    Array.from(list.children).forEach(function(el){
      const matchLevel =
        _level === 'all'   ? true :
        _level === 'warn'  ? (el.classList.contains('warn') || el.classList.contains('error')) :
        /* error */          el.classList.contains('error')
      const matchText = q === '' || el.textContent.toLowerCase().includes(q)
      el.style.display = (matchLevel && matchText) ? '' : 'none'
    })
  }

  function _scrollBottom(){
    if(_paused) return
    const list = document.getElementById('log-list')
    if(list) list.scrollTop = list.scrollHeight
  }

  // ── public: render / append ───────────────────────────────────────────────

  function renderEntries(entries){
    const list = document.getElementById('log-list')
    if(!list) return
    while(list.firstChild) list.removeChild(list.firstChild)
    entries.forEach(function(e){ list.appendChild(makeEntry(e)) })
    _applyFilters()
    _scrollBottom()
  }

  function appendEntry(e){
    const list = document.getElementById('log-list')
    if(!list) return
    const el = makeEntry(e)
    list.appendChild(el)

    // Apply filter to the single new element
    const q = (document.getElementById('log-search').value || '').toLowerCase()
    const matchLevel =
      _level === 'all'   ? true :
      _level === 'warn'  ? (el.classList.contains('warn') || el.classList.contains('error')) :
                           el.classList.contains('error')
    const matchText = q === '' || el.textContent.toLowerCase().includes(q)
    if(!(matchLevel && matchText)) el.style.display = 'none'

    _scrollBottom()
  }

  // ── level filter ──────────────────────────────────────────────────────────

  window._setLevel = function(level){
    _level = level
    document.getElementById('btn-all').classList.toggle('active',   level === 'all')
    document.getElementById('btn-warn').classList.toggle('active',  level === 'warn')
    document.getElementById('btn-error').classList.toggle('active', level === 'error')
    _applyFilters()
  }

  // ── auto-scroll toggle ────────────────────────────────────────────────────

  window._togglePause = function(){
    _paused = !_paused
    document.getElementById('btn-pause').classList.toggle('active', _paused)
    if(!_paused) _scrollBottom()
  }

  // ── download ──────────────────────────────────────────────────────────────

  window.downloadLog = function(){
    const list = document.getElementById('log-list')
    if(!list) return
    const lines = Array.from(list.children)
      .filter(function(el){ return el.style.display !== 'none' })
      .map(function(el){ return el.textContent })
      .join('\n')
    const blob = new Blob([lines], {type:'text/plain'})
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = 'log-' + _src + '-' + new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.txt'
    a.click()
    URL.revokeObjectURL(a.href)
  }

  // ── search input ──────────────────────────────────────────────────────────

  document.getElementById('log-search').addEventListener('input', _applyFilters)

  // ── existing public API ───────────────────────────────────────────────────

  window.showLog = function(src){
    _src = src
    document.getElementById('btn-board').classList.toggle('active', src === 'board')
    document.getElementById('btn-pi').classList.toggle('active',    src === 'pi')
    fetch('/api/logs/' + src).then(function(r){ return r.json() }).then(renderEntries).catch(function(){})
  }

  window.clearLog = function(){
    const list = document.getElementById('log-list')
    if(list) while(list.firstChild) list.removeChild(list.firstChild)
  }

  window.addEventListener('log-entry', function(e){
    const entry = e.detail
    if(entry.source === _src) appendEntry(entry)
  })

  showLog('board')
})()
</script>
{% endblock %}
