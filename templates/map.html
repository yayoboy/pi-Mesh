{% extends "base.html" %}
{% block content %}
<style>
  #content { overflow: hidden; }

  .f-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    height: 36px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .f-row:last-child { border-bottom: none; }
  .f-row:active { background: rgba(255,255,255,0.04); }

  .tog { position:relative; width:30px; height:17px; flex-shrink:0; pointer-events:none; }
  .tog input { opacity:0; width:0; height:0; position:absolute; }
  .tog-t { position:absolute; inset:0; border-radius:9px; background:var(--border,#2a3a4a); transition:background .12s; }
  .tog input:checked + .tog-t { background:var(--accent,#4a9eff); }
  .tog-k { position:absolute; top:3px; left:3px; width:11px; height:11px; border-radius:50%; background:#eee; transition:transform .12s; }
  .tog input:checked ~ .tog-k { transform:translateX(13px); }

  .mk-row {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 36px;
    padding: 0 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
</style>

<div style="position:relative;width:100%;height:100%;">

  <!-- Mappa Leaflet (piena) -->
  <div id="map-container"
       data-bounds='{{ bounds | tojson }}'
       data-zoom-min="{{ zoom_min }}"
       data-zoom-max="{{ zoom_max }}"
       style="position:absolute;inset:0;"></div>

  <!-- Toggle sidebar marker — top-left 36×36 -->
  <button id="sidebar-toggle"
          style="position:absolute;top:8px;left:8px;z-index:1000;
                 width:36px;height:36px;padding:0;
                 display:flex;align-items:center;justify-content:center;
                 background:rgba(10,12,20,0.9);border:1px solid var(--border);
                 border-radius:4px;color:var(--text,#ccc);
                 -webkit-tap-highlight-color:transparent;">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
  </button>

  <!-- Toggle filtri — top-right 36×36 -->
  <button id="filter-toggle"
          style="position:absolute;top:8px;right:8px;z-index:1000;
                 width:36px;height:36px;padding:0;
                 display:flex;align-items:center;justify-content:center;
                 background:rgba(10,12,20,0.9);border:1px solid var(--border);
                 border-radius:4px;color:var(--text,#ccc);
                 -webkit-tap-highlight-color:transparent;">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
    </svg>
  </button>

  <!-- Badge traceroute -->
  <div id="traceroute-badge"
       style="display:none;position:absolute;top:8px;left:52px;right:52px;z-index:900;
              background:rgba(10,12,20,0.95);border:1px solid var(--accent);border-radius:3px;
              padding:3px 6px;font-size:9px;color:var(--accent);
              align-items:center;gap:4px;overflow:hidden;height:36px;box-sizing:border-box;">
    <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
    </svg>
    <span id="traceroute-badge-text" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;"></span>
  </div>

  <!-- Sidebar marker — slide da sinistra -->
  <div id="marker-sidebar"
       style="display:none;position:absolute;top:52px;left:0;bottom:28px;width:130px;z-index:700;
              flex-direction:column;overflow:hidden;
              background:var(--bg,#0a0c14);border-right:1px solid var(--border);">
    <div style="padding:6px 10px 4px;font-size:9px;color:var(--accent);
                text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;
                border-bottom:1px solid var(--border);">
      Marker
    </div>
    <div id="marker-list" style="flex:1;overflow-y:auto;"></div>
    <div style="padding:6px 8px;border-top:1px solid var(--border);flex-shrink:0;">
      <button id="add-marker-btn"
              style="width:100%;font-size:12px;padding:8px 0;
                     display:flex;align-items:center;justify-content:center;gap:5px;
                     -webkit-tap-highlight-color:transparent;">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Aggiungi
      </button>
    </div>
  </div>

  <!-- Pannello filtri — slide da destra -->
  <div id="filter-panel"
       style="display:none;position:absolute;top:52px;right:0;bottom:28px;width:155px;z-index:700;
              flex-direction:column;overflow:hidden;
              background:var(--bg,#0a0c14);border-left:1px solid var(--border);">
    <div style="padding:6px 12px 4px;font-size:9px;color:var(--accent);
                text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;
                border-bottom:1px solid var(--border);">
      Filtri
    </div>

    <label class="f-row"><span>Online</span>
      <span class="tog"><input type="checkbox" id="filter-online"><span class="tog-t"></span><span class="tog-k"></span></span>
    </label>
    <label class="f-row"><span>Offline</span>
      <span class="tog"><input type="checkbox" id="filter-offline"><span class="tog-t"></span><span class="tog-k"></span></span>
    </label>
    <label class="f-row"><span>Linee hop</span>
      <span class="tog"><input type="checkbox" id="filter-hoplines"><span class="tog-t"></span><span class="tog-k"></span></span>
    </label>
    <label class="f-row"><span>Marker</span>
      <span class="tog"><input type="checkbox" id="filter-markers"><span class="tog-t"></span><span class="tog-k"></span></span>
    </label>
    <label class="f-row" style="border-bottom:none;"><span>Nodo locale</span>
      <span class="tog"><input type="checkbox" id="filter-local"><span class="tog-t"></span><span class="tog-k"></span></span>
    </label>

    <div style="padding:10px 12px;border-top:1px solid var(--border);">
      <div style="display:flex;align-items:center;justify-content:space-between;
                  margin-bottom:8px;font-size:12px;">
        <span style="color:var(--muted,#666);">Hop max</span>
        <span id="filter-maxhops-val" style="color:var(--accent);font-weight:600;">7</span>
      </div>
      <input type="range" id="filter-maxhops" min="1" max="7" value="7"
             style="width:100%;height:24px;cursor:pointer;">
    </div>
  </div>

  <!-- Legenda bottom -->
  <div id="map-legend"
       style="position:absolute;bottom:0;left:0;right:0;height:28px;
              background:rgba(8,10,18,0.97);border-top:1px solid var(--border);
              display:flex;align-items:center;gap:8px;padding:0 8px;
              font-size:9px;overflow-x:auto;white-space:nowrap;">
    <div style="display:flex;align-items:center;gap:3px;">
      <div style="width:8px;height:8px;border-radius:50%;background:#4a9eff;box-shadow:0 0 3px #4a9eff;flex-shrink:0;"></div>Locale
    </div>
    <div style="display:flex;align-items:center;gap:3px;">
      <div style="width:8px;height:8px;border-radius:50%;background:#4caf50;flex-shrink:0;"></div>Online
    </div>
    <div style="display:flex;align-items:center;gap:3px;">
      <div style="width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;"></div>Offline
    </div>
    <div style="width:1px;height:14px;background:var(--border);flex-shrink:0;"></div>
    <div style="display:flex;align-items:center;gap:3px;">
      <div style="width:16px;height:2px;background:#4caf50;border-radius:1px;flex-shrink:0;"></div>buono
    </div>
    <div style="display:flex;align-items:center;gap:3px;">
      <div style="width:16px;height:2px;background:#fb8c00;border-radius:1px;flex-shrink:0;"></div>medio
    </div>
    <div style="display:flex;align-items:center;gap:3px;">
      <div style="width:16px;height:2px;background:#e53935;border-radius:1px;flex-shrink:0;"></div>scarso
    </div>
    <div style="width:1px;height:14px;background:var(--border);flex-shrink:0;"></div>
    <div style="display:flex;align-items:center;gap:3px;">
      <div style="width:16px;height:2px;background:#ffd54f;opacity:0.8;border-radius:1px;flex-shrink:0;"></div>route
    </div>
  </div>

</div>

<!-- Modal aggiunta marker -->
<div id="marker-modal"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;
            align-items:center;justify-content:center;">
  <div style="background:var(--panel,#12151f);border:1px solid var(--border);
              border-radius:6px;padding:16px;
              width:calc(100vw - 32px);max-width:290px;font-size:13px;">
    <div style="font-size:11px;font-weight:600;margin-bottom:12px;
                color:var(--accent);text-transform:uppercase;letter-spacing:.06em;">
      Nuovo marker
    </div>
    <input id="marker-label" type="text" placeholder="Nome..."
           style="width:100%;margin-bottom:10px;box-sizing:border-box;
                  font-size:14px;padding:9px 10px;border-radius:4px;">
    <select id="marker-type"
            style="width:100%;margin-bottom:10px;box-sizing:border-box;
                   font-size:14px;padding:9px 10px;border-radius:4px;">
      <option value="poi">Punto di interesse</option>
      <option value="antenna">Antenna</option>
      <option value="base">Base operativa</option>
      <option value="obstacle">Ostacolo</option>
    </select>
    <div id="marker-coords-hint"
         style="font-size:11px;color:var(--muted,#666);margin-bottom:12px;text-align:center;">
      Tocca la mappa per posizionare
    </div>
    <div style="display:flex;gap:8px;">
      <button id="marker-cancel"
              style="flex:1;padding:10px 0;font-size:13px;border-radius:4px;">
        Annulla
      </button>
      <button id="marker-save"
              style="flex:1;padding:10px 0;font-size:13px;font-weight:600;
                     background:var(--accent);color:#fff;border:none;
                     border-radius:4px;cursor:pointer;">
        Salva
      </button>
    </div>
  </div>
</div>

<script src="/static/map.js"></script>
<script>
var _pendingMarkerLatLng = null

document.getElementById('sidebar-toggle').onclick = function() {
  var s = document.getElementById('marker-sidebar')
  var shown = s.style.display === 'flex'
  s.style.display = shown ? 'none' : 'flex'
  if (!shown) document.getElementById('filter-panel').style.display = 'none'
}

document.getElementById('filter-toggle').onclick = function() {
  var p = document.getElementById('filter-panel')
  var shown = p.style.display === 'flex'
  p.style.display = shown ? 'none' : 'flex'
  if (!shown) document.getElementById('marker-sidebar').style.display = 'none'
}

document.getElementById('add-marker-btn').onclick = function() {
  _pendingMarkerLatLng = null
  document.getElementById('marker-coords-hint').textContent = 'Tocca la mappa per posizionare'
  document.getElementById('marker-coords-hint').style.color = ''
  document.getElementById('marker-label').value = ''
  document.getElementById('marker-modal').style.display = 'flex'
  document.getElementById('marker-sidebar').style.display = 'none'
  if (typeof leafletMap !== 'undefined' && leafletMap) {
    leafletMap.once('click', function(e) {
      _pendingMarkerLatLng = e.latlng
      document.getElementById('marker-coords-hint').textContent =
        e.latlng.lat.toFixed(4) + '\u00b0, ' + e.latlng.lng.toFixed(4) + '\u00b0'
    })
  }
}

document.getElementById('marker-cancel').onclick = function() {
  document.getElementById('marker-modal').style.display = 'none'
  if (typeof leafletMap !== 'undefined' && leafletMap) leafletMap.off('click')
  _pendingMarkerLatLng = null
}

document.getElementById('marker-save').onclick = async function() {
  var label = document.getElementById('marker-label').value.trim()
  var type  = document.getElementById('marker-type').value
  if (!label) { document.getElementById('marker-label').focus(); return }
  if (!_pendingMarkerLatLng) {
    var hint = document.getElementById('marker-coords-hint')
    hint.textContent = 'Tocca prima la mappa!'
    hint.style.color = 'var(--danger,#ef9a9a)'
    return
  }
  try {
    await addCustomMarker(label, type, _pendingMarkerLatLng)
    document.getElementById('marker-modal').style.display = 'none'
  } catch(e) {
    var hint = document.getElementById('marker-coords-hint')
    hint.textContent = 'Errore nel salvataggio'
    hint.style.color = 'var(--danger,#ef9a9a)'
  }
}
</script>
{% endblock %}
