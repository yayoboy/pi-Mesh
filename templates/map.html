{% extends "base.html" %}
{% block head %}
<link rel="stylesheet" href="/static/leaflet/leaflet.css"/>
<script src="/static/leaflet/leaflet.js"></script>
<style>
  main { overflow: hidden !important; }
  .leaflet-control-zoom a {
    background: rgba(6,8,16,0.55) !important;
    border-color: rgba(26,34,51,0.5) !important;
    color: var(--text,#c9d1e0) !important;
  }
</style>
{% endblock %}
{% block content %}
<div style="position:relative;width:100%;height:100%;">

  <div id="map-container"
       data-bounds='{{ bounds | tojson }}'
       data-zoom-min="{{ zoom_min }}"
       data-zoom-max="{{ zoom_max }}"
       style="position:absolute;inset:0;"></div>

  <!-- Panel toggle top-right -->
  <button id="panel-toggle"
          style="position:absolute;top:6px;right:6px;z-index:1000;
                 width:32px;height:32px;padding:0;
                 display:flex;align-items:center;justify-content:center;
                 background:rgba(6,8,16,0.55);border:1px solid rgba(26,34,51,0.5);
                 border-radius:4px;color:var(--text);
                 -webkit-tap-highlight-color:transparent;">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/>
    </svg>
  </button>

  <!-- Layer switcher compatto -->
  <div style="position:absolute;top:46px;right:6px;z-index:1000;
              background:rgba(6,8,16,0.55);border:1px solid rgba(26,34,51,0.5);
              border-radius:4px;overflow:hidden;width:32px;">
    <button class="layer-btn" data-layer="osm" onclick="switchLayer('osm')" title="Stradale"
            style="width:100%;height:28px;padding:0;border:none;border-bottom:1px solid rgba(26,34,51,0.4);
                   background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
                   color:var(--accent);-webkit-tap-highlight-color:transparent;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
      </svg>
    </button>
    <button class="layer-btn" data-layer="topo" onclick="switchLayer('topo')" title="Topo"
            style="width:100%;height:28px;padding:0;border:none;border-bottom:1px solid rgba(26,34,51,0.4);
                   background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
                   color:var(--text);-webkit-tap-highlight-color:transparent;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 21l5-10 5 5 4-7 4 12"/>
      </svg>
    </button>
    <button class="layer-btn" data-layer="satellite" onclick="switchLayer('satellite')" title="Satellite"
            style="width:100%;height:28px;padding:0;border:none;
                   background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
                   color:var(--text);-webkit-tap-highlight-color:transparent;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.3 6.3l11.4 11.4M17.7 6.3L6.3 17.7"/>
      </svg>
    </button>
  </div>

  <!-- Toggle legenda -->
  <button id="btn-legend" title="Legenda"
          style="position:absolute;bottom:110px;right:6px;z-index:1000;
                 width:32px;height:32px;padding:0;
                 display:flex;align-items:center;justify-content:center;
                 background:rgba(6,8,16,0.55);border:1px solid rgba(26,34,51,0.5);
                 border-radius:4px;cursor:pointer;color:var(--text);
                 -webkit-tap-highlight-color:transparent;"
          onclick="var l=document.getElementById('map-legend');l.style.display=l.style.display==='block'?'none':'block'">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
  </button>

  <!-- Centra sulla board -->
  <button id="btn-center-board" onclick="centerOnBoard()" title="Centra sulla board"
          style="position:absolute;bottom:70px;right:6px;z-index:1000;
                 width:32px;height:32px;padding:0;
                 display:flex;align-items:center;justify-content:center;
                 background:rgba(6,8,16,0.55);border:1px solid rgba(26,34,51,0.5);
                 border-radius:4px;cursor:pointer;color:var(--text);
                 -webkit-tap-highlight-color:transparent;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="3"/>
      <path stroke-linecap="round" d="M12 2v4m0 12v4M2 12h4m12 0h4"/>
    </svg>
  </button>

  <!-- Traceroute badge -->
  <div id="traceroute-badge"
       style="display:none;position:absolute;bottom:70px;left:6px;z-index:1000;
              align-items:center;gap:6px;padding:5px 10px;
              background:rgba(6,8,16,0.85);border:1px solid rgba(26,34,51,0.5);
              border-radius:4px;font-size:10px;color:var(--text);">
    <span id="traceroute-badge-text"></span>
    <button onclick="tracerouteLayer.clearLayers();this.parentElement.style.display='none'"
            style="background:none;border:none;color:var(--muted);cursor:pointer;padding:0;margin-left:4px;font-size:12px;"
            title="Chiudi">&times;</button>
  </div>

  <!-- Legenda -->
  <div id="map-legend"
       style="display:none;position:absolute;bottom:70px;left:6px;z-index:900;
              background:rgba(6,8,16,0.85);border:1px solid rgba(26,34,51,0.5);
              border-radius:4px;padding:8px 10px;font-size:9px;color:var(--text);min-width:120px;">
    <div style="font-weight:700;margin-bottom:5px;color:var(--accent);text-transform:uppercase;">Legenda</div>
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">
      <span style="width:10px;height:10px;border-radius:50%;background:#4a9eff;display:inline-block;"></span> Nodo locale
    </div>
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">
      <span style="width:10px;height:10px;border-radius:50%;background:#4caf50;display:inline-block;"></span> Online (&lt;30m)
    </div>
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">
      <span style="width:10px;height:10px;border-radius:50%;background:#374151;display:inline-block;"></span> Offline
    </div>
    <div style="border-top:1px solid var(--border);margin:4px 0;"></div>
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">
      <span style="width:14px;height:3px;background:#4caf50;display:inline-block;border-radius:1px;"></span> SNR buono
    </div>
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">
      <span style="width:14px;height:3px;background:#fb8c00;display:inline-block;border-radius:1px;"></span> SNR medio
    </div>
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">
      <span style="width:14px;height:3px;background:#e53935;display:inline-block;border-radius:1px;"></span> SNR scarso
    </div>
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">
      <span style="width:14px;height:0;border-top:2px dashed #4a9eff;display:inline-block;"></span> Traccia GPS
    </div>
    <div style="display:flex;align-items:center;gap:5px;">
      <span style="width:14px;height:0;border-top:3px dashed #fb8c00;display:inline-block;"></span> Traceroute
    </div>
  </div>

  <!-- Popup nodo -->
  <div id="node-popup"
       style="display:none;position:absolute;z-index:900;
              background:rgba(6,8,16,0.96);border:1px solid var(--border);
              border-radius:6px;padding:10px;width:190px;
              box-shadow:0 4px 16px rgba(0,0,0,0.6);font-size:10px;pointer-events:auto;">
  </div>

  <!-- Pannello laterale -->
  <div id="right-panel"
       style="display:none;position:absolute;top:0;right:0;bottom:0;width:160px;z-index:700;
              flex-direction:column;overflow:hidden;
              background:var(--bg);border-left:1px solid var(--border);">
    <div style="display:flex;border-bottom:1px solid var(--border);">
      <button id="panel-tab-filters"
              onclick="setPanelTab('filters')"
              style="flex:1;padding:5px 0;font-size:9px;border:none;cursor:pointer;
                     color:var(--accent);background:var(--panel);border-bottom:2px solid var(--accent);">
        Filtri
      </button>
      <button id="panel-tab-topology"
              onclick="setPanelTab('topology')"
              style="flex:1;padding:5px 0;font-size:9px;border:none;cursor:pointer;
                     color:var(--muted);background:transparent;border-bottom:2px solid transparent;">
        Topo
      </button>
      <button id="panel-tab-waypoints"
              onclick="setPanelTab('waypoints')"
              style="flex:1;padding:5px 0;font-size:9px;border:none;cursor:pointer;
                     color:var(--muted);background:transparent;border-bottom:2px solid transparent;">
        WP
      </button>
    </div>
        <!-- Filtri mappa -->
        <div id="filter-panel" style="padding:8px;border-bottom:1px solid var(--border,#2a3a4a);">
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--accent,#4a9eff);margin-bottom:6px;">Filtri</div>
          <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text,#ccc);margin-bottom:4px;cursor:pointer;">
            <input type="checkbox" id="filter-online" style="accent-color:var(--accent,#4a9eff);"> Online
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text,#ccc);margin-bottom:4px;cursor:pointer;">
            <input type="checkbox" id="filter-offline" style="accent-color:var(--accent,#4a9eff);"> Offline
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text,#ccc);margin-bottom:4px;cursor:pointer;">
            <input type="checkbox" id="filter-hoplines" style="accent-color:var(--accent,#4a9eff);"> Linee hop
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text,#ccc);margin-bottom:4px;cursor:pointer;">
            <input type="checkbox" id="filter-breadcrumbs" style="accent-color:var(--accent,#4a9eff);"> Tracce GPS
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text,#ccc);margin-bottom:4px;cursor:pointer;">
            <input type="checkbox" id="filter-waypoints" style="accent-color:var(--accent,#4a9eff);"> Waypoints
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text,#ccc);margin-bottom:4px;cursor:pointer;">
            <input type="checkbox" id="filter-neighbor" style="accent-color:var(--accent,#4a9eff);"> Neighbor links
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text,#ccc);margin-bottom:4px;cursor:pointer;">
            <input type="checkbox" id="filter-markers" style="accent-color:var(--accent,#4a9eff);"> Marker
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text,#ccc);margin-bottom:4px;cursor:pointer;">
            <input type="checkbox" id="filter-local" style="accent-color:var(--accent,#4a9eff);"> Nodo locale
          </label>
          <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text,#ccc);margin-top:4px;">
            <span>Max hops:</span>
            <input type="range" id="filter-maxhops" min="1" max="10" style="flex:1;accent-color:var(--accent,#4a9eff);">
            <span id="filter-maxhops-val" style="min-width:14px;text-align:right;">7</span>
          </div>
        </div>

    <div id="panel-topology"
         style="display:none;padding:8px;overflow-y:auto;flex:1;flex-direction:column;">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:6px;">
        Grafo mesh
      </div>
      <svg id="topology-svg" width="144" height="200"
           style="background:rgba(0,0,0,.2);border-radius:4px;display:block;"></svg>
      <button onclick="renderTopologyGraph()"
              style="margin-top:6px;width:100%;padding:4px 0;font-size:9px;
                     background:none;border:1px solid var(--border);border-radius:3px;
                     color:var(--muted);cursor:pointer;">
        Aggiorna
      </button>
    </div>

    <div id="panel-waypoints"
         style="display:none;padding:8px;overflow-y:auto;flex:1;flex-direction:column;">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:6px;">
        Waypoints attivi
      </div>
      <div id="waypoints-list" style="font-size:10px;color:var(--text);"></div>
    </div>
  </div>
</div>

<script>
// Pre-populate nodeCache from server-rendered JSON (no initial HTTP request)
var _serverNodes = {{ nodes_data | tojson }};
</script>
<script src="/static/map.js?v=14"></script>
<script>
function setPanelTab(tab) {
  var tabs = ['filters', 'topology', 'waypoints']
  tabs.forEach(function(t) {
    var btn = document.getElementById('panel-tab-' + t)
    var panel = t === 'filters'
      ? document.getElementById('filter-panel')
      : document.getElementById('panel-' + t)
    if (btn) {
      var active = (t === tab)
      btn.style.color      = active ? 'var(--accent)' : 'var(--muted)'
      btn.style.background = active ? 'var(--panel)'  : 'transparent'
      btn.style.borderBottom = active ? '2px solid var(--accent)' : '2px solid transparent'
    }
    if (panel) panel.style.display = (t === tab) ? 'block' : 'none'
  })
  if (tab === 'topology')  renderTopologyGraph()
  if (tab === 'waypoints') refreshWaypointsList()
}

function renderTopologyGraph() {
  var svg = document.getElementById('topology-svg')
  if (!svg) return
  fetch('/api/neighbor-info').then(function(r) { return r.json() }).then(function(links) {
    while (svg.firstChild) svg.removeChild(svg.firstChild)
    var nodeIds = {}
    links.forEach(function(l) { nodeIds[l.from_id] = 1; nodeIds[l.neighbor_id] = 1 })
    var ids = Object.keys(nodeIds)
    if (ids.length === 0) {
      var t = document.createElementNS('http://www.w3.org/2000/svg', 'text')
      t.setAttribute('x', '72'); t.setAttribute('y', '100')
      t.setAttribute('text-anchor', 'middle')
      t.setAttribute('fill', '#666'); t.setAttribute('font-size', '10')
      t.textContent = 'Nessun dato'
      svg.appendChild(t)
      return
    }
    var W = 144, H = 200, cx = W / 2, cy = H / 2, r = Math.min(cx, cy) - 20
    var pos = {}
    ids.forEach(function(id, i) {
      var angle = (2 * Math.PI * i / ids.length) - Math.PI / 2
      pos[id] = {x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle)}
    })
    links.forEach(function(l) {
      var a = pos[l.from_id], b = pos[l.neighbor_id]
      if (!a || !b) return
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line')
      line.setAttribute('x1', a.x); line.setAttribute('y1', a.y)
      line.setAttribute('x2', b.x); line.setAttribute('y2', b.y)
      line.setAttribute('stroke', snrColor(l.snr))
      line.setAttribute('stroke-width', '1.5')
      line.setAttribute('opacity', '0.7')
      svg.appendChild(line)
    })
    ids.forEach(function(id) {
      var p = pos[id]
      var node = nodeCache ? nodeCache.get(id) : null
      var isLocal = node && node.is_local
      var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
      circle.setAttribute('cx', p.x); circle.setAttribute('cy', p.y)
      circle.setAttribute('r', isLocal ? 8 : 6)
      circle.setAttribute('fill', isLocal ? '#2196f3' : '#333')
      circle.setAttribute('stroke', '#fff'); circle.setAttribute('stroke-width', '1')
      svg.appendChild(circle)
      var label = document.createElementNS('http://www.w3.org/2000/svg', 'text')
      label.setAttribute('x', p.x); label.setAttribute('y', p.y + 3)
      label.setAttribute('text-anchor', 'middle')
      label.setAttribute('fill', '#ccc'); label.setAttribute('font-size', '7')
      label.textContent = isLocal ? 'ME' : id.slice(-4)
      svg.appendChild(label)
    })
  })
}

function refreshWaypointsList() {
  fetch('/api/waypoints').then(function(r) { return r.json() }).then(function(data) {
    var el = document.getElementById('waypoints-list')
    if (!el) return
    while (el.firstChild) el.removeChild(el.firstChild)
    if (data.length === 0) {
      var empty = document.createElement('div')
      empty.style.color = 'var(--muted)'
      empty.textContent = 'Nessun waypoint'
      el.appendChild(empty)
      return
    }
    data.forEach(function(wp) {
      var item = document.createElement('div')
      item.style.cssText = 'border-bottom:1px solid var(--border);padding:4px 0;'
      var name = document.createElement('b')
      name.textContent = wp.name || '?'
      item.appendChild(name)
      var meta = document.createElement('div')
      meta.style.cssText = 'font-size:9px;color:var(--muted);'
      meta.textContent = wp.from_id
      item.appendChild(meta)
      el.appendChild(item)
    })
  })
}

document.getElementById('panel-toggle').onclick = function() {
  var p = document.getElementById('right-panel')
  p.style.display = p.style.display === 'flex' ? 'none' : 'flex'
}

// Feed server nodes into nodeCache on load
if (typeof nodeCache !== 'undefined' && _serverNodes) {
  _serverNodes.forEach(function(n) { nodeCache.set(n.id, n) })
}
</script>
{% endblock %}
