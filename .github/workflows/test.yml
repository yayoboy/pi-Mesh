name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint shell scripts
        run: |
          bash -n setup.sh
          bash -n scripts/start-gui.sh

      - name: Verify Python syntax of GUI sources
        # The GUI Qt wrapper imports PySide6 lazily; we don't install it in CI
        # because the Qt-pure tests are what we run here. This ensures every
        # file at least parses.
        run: |
          python -m compileall -q gui/ tests/

      - name: Run pytest (core + GUI-pure)
        run: pytest -v
