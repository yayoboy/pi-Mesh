name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install core deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint shell scripts
        run: |
          bash -n setup.sh
          bash -n scripts/setup-display.sh
          bash -n scripts/setup-display-hdmi.sh
          bash -n scripts/start-kiosk.sh
          bash -n scripts/start-kiosk-hdmi.sh

      - name: Run pytest
        run: pytest -v
