[pytest]
asyncio_mode = auto
; Solo le suite vere: scripts/test_*.py sono script Qt manuali, non test.
testpaths = tests gui/tests
; pytest-qt pretende un binding Qt installato gia' all'avvio del plugin: in
; CI e nei dev-env senza PySide6 farebbe fallire tutto (exit 4). I test in
; gui/tests sono Qt-puri e non usano qtbot; per eventuali test qtbot sul Pi
; rilanciare con "pytest -p pytest-qt ...".
addopts = -p no:pytest-qt
